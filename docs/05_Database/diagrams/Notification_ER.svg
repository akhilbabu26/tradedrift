<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#555555" />
    </marker>
    <marker id="one-to-many" viewBox="0 0 20 10" refX="18" refY="5" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <!-- Crow's foot representation for ER diagram -->
      <path d="M 0 5 L 18 5 M 10 0 L 18 5 L 10 10" fill="none" stroke="#555555" stroke-width="1.5" />
      <circle cx="6" cy="5" r="2" fill="white" stroke="#555555" stroke-width="1.5" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa" />  <!-- Table: notifications -->
  <rect x="50" y="40" width="240" height="208" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 50 46 A 6 6 0 0 1 56 40 L 284 40 A 6 6 0 0 1 290 46 L 290 70 L 50 70 Z" fill="#4e5d6c" />
  <text x="170" y="60" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">notifications</text>
  <text x="62" y="88" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="62" y="112" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  user_id : UUID</text>
  <text x="62" y="136" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  title : VARCHAR(255)</text>
  <text x="62" y="160" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  message : TEXT</text>
  <text x="62" y="184" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  type : VARCHAR(30)</text>
  <text x="62" y="208" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  is_read : BOOLEAN</text>
  <text x="62" y="232" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  created_at : TIMESTAMPTZ</text>
  <!-- Table: processed_events -->
  <rect x="380" y="40" width="240" height="112" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 380 46 A 6 6 0 0 1 386 40 L 614 40 A 6 6 0 0 1 620 46 L 620 70 L 380 70 Z" fill="#4e5d6c" />
  <text x="500" y="60" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">processed_events</text>
  <text x="392" y="88" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ event_id : UUID [PK]</text>
  <text x="392" y="112" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  user_id : UUID</text>
  <text x="392" y="136" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  processed_at : TIMESTAMPTZ</text>
</svg>
