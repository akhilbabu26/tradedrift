<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1020" viewBox="0 0 980 1020">
  <defs>
    <!-- Drop Shadow Filter for Nodes -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <!-- Standard Marker/Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- TITLE -->
  <text x="490" y="30" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#0F172A" text-anchor="middle">Recovery Catch-Up &amp; State Transition Flow</text>

  <!-- ==================== NODES ==================== -->

  <!-- A: STARTING (Process) -->
  <g filter="url(#shadow)">
    <rect x="170" y="60" width="260" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="90" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">STARTING: Connect Kafka/Postgres</text>
  </g>

  <!-- B: LOADING CHECKPOINT (Process) -->
  <g filter="url(#shadow)">
    <rect x="140" y="145" width="320" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="175" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">LOADING CHECKPOINT: Read partition offset C</text>
  </g>

  <!-- C: Set startOffset = 0 (Process) -->
  <g filter="url(#shadow)">
    <rect x="130" y="230" width="340" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="255" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Set startOffset = 0</text>
    <text x="300" y="268" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">(Always seek to 0 to rebuild resting orders)</text>
  </g>

  <!-- D: Seek partition to offset 0 (Process) -->
  <g filter="url(#shadow)">
    <rect x="150" y="315" width="300" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="345" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">RECOVERY State: Seek partition to offset 0</text>
  </g>

  <!-- E: Suppress Output Queue sends (Process) -->
  <g filter="url(#shadow)">
    <rect x="170" y="400" width="260" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="430" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Suppress Output Queue sends</text>
  </g>

  <!-- F: Fetch and process Kafka messages (Process) -->
  <g filter="url(#shadow)">
    <rect x="140" y="485" width="320" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="515" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Fetch &amp; process Kafka messages sequentially</text>
  </g>

  <!-- G: offset == checkpointOffset? (Decision) -->
  <g filter="url(#shadow)">
    <polygon points="300,570 390,610 300,650 210,610" fill="#EA580C"/>
    <text x="300" y="606" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">offset == checkpointOffset?</text>
    <text x="300" y="619" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="9" fill="#FFE5D9" text-anchor="middle">(Fully caught up to C?)</text>
  </g>

  <!-- H: Apply Match/Cancel in memory only (Process) -->
  <g filter="url(#shadow)">
    <rect x="10" y="585" width="160" height="50" rx="8" fill="#2563EB"/>
    <text x="90" y="610" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Apply Match/Cancel</text>
    <text x="90" y="623" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">in memory only</text>
  </g>

  <!-- I: Transition to LIVE State (Process) -->
  <g filter="url(#shadow)">
    <rect x="130" y="685" width="340" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="710" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Transition to LIVE State:</text>
    <text x="300" y="723" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">Unsuppress Output Queue</text>
  </g>

  <!-- J: Send sentinel MatchResult (Process) -->
  <g filter="url(#shadow)">
    <rect x="140" y="770" width="320" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="795" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Send sentinel MatchResult to Output Queue</text>
    <text x="300" y="808" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">Contains depthSnapshot &amp; sourceOffset</text>
  </g>

  <!-- K: Publisher pushes caught-up depth (Process) -->
  <g filter="url(#shadow)">
    <rect x="140" y="855" width="320" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="880" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Publisher pushes depth to Redis</text>
    <text x="300" y="893" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">(No new Postgres checkpoint write needed)</text>
  </g>

  <!-- L: Begin live processing (Success/End State) -->
  <g filter="url(#shadow)">
    <rect x="100" y="940" width="400" height="50" rx="8" fill="#16A34A"/>
    <text x="300" y="965" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Begin live processing: match live events</text>
    <text x="300" y="978" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="9" fill="#D1FAE5" text-anchor="middle">(Kafka publish, Redis updates, and Postgres checkpoints enabled)</text>
  </g>

  <!-- ==================== PATHS / ARROWS ==================== -->

  <!-- A -> B -->
  <path d="M 300 110 L 300 145" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- B -> C -->
  <path d="M 300 195 L 300 230" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- C -> D -->
  <path d="M 300 280 L 300 315" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- D -> E -->
  <path d="M 300 365 L 300 400" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- E -> F -->
  <path d="M 300 450 L 300 485" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- F -> G -->
  <path d="M 300 535 L 300 570" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- G -> H (No) -->
  <path d="M 210 610 L 170 610" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="190" y="602" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">No</text>

  <!-- H -> F loop back -->
  <path d="M 90 585 L 90 510 L 140 510" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- G -> I (Yes) -->
  <path d="M 300 650 L 300 685" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="315" y="665" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">Yes</text>

  <!-- I -> J -->
  <path d="M 300 735 L 300 770" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- J -> K -->
  <path d="M 300 820 L 300 855" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- K -> L -->
  <path d="M 300 905 L 300 940" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

</svg>
