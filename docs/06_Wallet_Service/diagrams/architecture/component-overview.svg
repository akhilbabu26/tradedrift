<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f97316"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a855f7"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="980" height="700" fill="url(#bg)"/>
  <rect width="980" height="700" fill="none" stroke="#1e293b" stroke-width="2"/>
  <text x="490" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Wallet Service — Component Overview</text>
  <text x="490" y="55" text-anchor="middle" fill="#64748b" font-size="12">TradeDrift V7 · Financial ledger · Three callers · Outbox-backed events</text>
  <line x1="80" y1="66" x2="900" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Three external callers -->
  <!-- Auth Service -->
  <rect x="40" y="82" width="170" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="125" y="103" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Auth Service</text>
  <text x="125" y="120" text-anchor="middle" fill="#475569" font-size="10">User registration</text>

  <!-- Order Service -->
  <rect x="40" y="158" width="170" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="125" y="178" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Order Service</text>
  <text x="125" y="196" text-anchor="middle" fill="#475569" font-size="10">ReserveFunds / ReleaseFunds</text>

  <!-- Settlement Service -->
  <rect x="40" y="234" width="170" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="125" y="254" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Settlement Service</text>
  <text x="125" y="272" text-anchor="middle" fill="#475569" font-size="10">SettleTrade</text>

  <!-- gRPC arrows to Wallet Service boundary -->
  <line x1="210" y1="107" x2="280" y2="107" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="244" y="100" text-anchor="middle" fill="#a855f7" font-size="9">InitializeWallet</text>

  <line x1="210" y1="183" x2="280" y2="183" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="244" y="176" text-anchor="middle" fill="#a855f7" font-size="9">Reserve/Release</text>

  <line x1="210" y1="259" x2="280" y2="259" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="244" y="252" text-anchor="middle" fill="#22c55e" font-size="9">SettleTrade</text>

  <!-- Wallet Service boundary -->
  <rect x="280" y="72" width="450" height="480" rx="12" fill="none" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="310" y="93" fill="#3b82f6" font-size="11" font-weight="600">Wallet Service</text>

  <!-- gRPC API layer -->
  <rect x="295" y="82" width="420" height="50" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="505" y="103" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">gRPC API Layer</text>
  <text x="505" y="120" text-anchor="middle" fill="#475569" font-size="10">InitializeWallet · ReserveFunds · ReleaseFunds · SettleTrade · GetBalance(s)</text>

  <line x1="505" y1="132" x2="505" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- Service Layer -->
  <rect x="295" y="160" width="420" height="80" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="505" y="180" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Service Layer</text>
  <text x="505" y="198" text-anchor="middle" fill="#475569" font-size="10">Idempotency check · FOR UPDATE row locking · Invariant enforcement</text>
  <text x="505" y="214" text-anchor="middle" fill="#475569" font-size="10">Accounting: available ↔ reserved balance updates</text>
  <text x="505" y="230" text-anchor="middle" fill="#334155" font-size="9">§8: each gRPC method explicitly states idempotent-success behavior on duplicate calls</text>

  <!-- Three sub-layers -->
  <line x1="380" y1="240" x2="340" y2="272" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrB)"/>
  <line x1="505" y1="240" x2="505" y2="272" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrB)"/>
  <line x1="630" y1="240" x2="670" y2="272" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrB)"/>

  <!-- Repository -->
  <rect x="295" y="272" width="160" height="56" rx="7" fill="#0f172a" stroke="#475569" stroke-width="1.3"/>
  <text x="375" y="292" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">Repository</text>
  <text x="375" y="308" text-anchor="middle" fill="#475569" font-size="9">wallets · reservations</text>
  <text x="375" y="322" text-anchor="middle" fill="#475569" font-size="9">transactions · outbox</text>

  <!-- Validator -->
  <rect x="427" y="272" width="155" height="56" rx="7" fill="#0f172a" stroke="#475569" stroke-width="1.3"/>
  <text x="504" y="292" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">Validator</text>
  <text x="504" y="308" text-anchor="middle" fill="#475569" font-size="9">Balance sufficiency</text>
  <text x="504" y="322" text-anchor="middle" fill="#475569" font-size="9">Asset support check</text>

  <!-- Outbox Publisher -->
  <rect x="559" y="272" width="150" height="56" rx="7" fill="#0f172a" stroke="#f97316" stroke-width="1.3"/>
  <text x="634" y="292" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">Outbox Publisher</text>
  <text x="634" y="308" text-anchor="middle" fill="#78350f" font-size="9">Background goroutine</text>
  <text x="634" y="322" text-anchor="middle" fill="#78350f" font-size="9">publishes TradeSettled</text>

  <!-- PostgreSQL box -->
  <rect x="295" y="356" width="420" height="90" rx="8" fill="#0d1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="505" y="378" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">PostgreSQL</text>
  <line x1="315" y1="386" x2="695" y2="386" stroke="#166534" stroke-width="0.5"/>
  <text x="360" y="402" text-anchor="middle" fill="#475569" font-size="10">wallets</text>
  <text x="450" y="402" text-anchor="middle" fill="#475569" font-size="10">wallet_reservations</text>
  <text x="565" y="402" text-anchor="middle" fill="#475569" font-size="10">wallet_transactions</text>
  <text x="666" y="402" text-anchor="middle" fill="#475569" font-size="10">outbox</text>
  <text x="505" y="420" text-anchor="middle" fill="#166534" font-size="9">UNIQUE(order_id) on reservations · UNIQUE(reference_id, reference_type, asset) on transactions</text>
  <text x="505" y="434" text-anchor="middle" fill="#166534" font-size="9">supported_assets · all IDs = UUID (UUIDv7, app-generated)</text>

  <!-- Lines from sub-layers to PG -->
  <line x1="375" y1="328" x2="375" y2="356" stroke="#64748b" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="504" y1="328" x2="504" y2="356" stroke="#64748b" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="634" y1="328" x2="634" y2="356" stroke="#f97316" stroke-width="1.3" marker-end="url(#arrO)"/>

  <!-- Outbox Publisher → Kafka -->
  <line x1="634" y1="446" x2="634" y2="476" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>
  <rect x="555" y="476" width="160" height="44" rx="7" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="635" y="496" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">Kafka</text>
  <text x="635" y="511" text-anchor="middle" fill="#78350f" font-size="9">TradeSettled (authoritative)</text>

  <!-- Downstream consumers -->
  <rect x="770" y="82" width="180" height="260" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.3"/>
  <text x="860" y="104" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">Dashboard</text>
  <text x="860" y="122" text-anchor="middle" fill="#334155" font-size="10">GET /wallets/me</text>
  <text x="860" y="138" text-anchor="middle" fill="#334155" font-size="10">GET /wallets/balances</text>
  <text x="860" y="154" text-anchor="middle" fill="#334155" font-size="10">GET /wallets/transactions</text>
  <line x1="780" y1="165" x2="800" y2="165" stroke="#1e293b" stroke-width="0.5"/>
  <text x="860" y="180" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">Downstream</text>
  <text x="860" y="198" text-anchor="middle" fill="#334155" font-size="10">Portfolio Service</text>
  <text x="860" y="214" text-anchor="middle" fill="#334155" font-size="10">Notification Service</text>
  <text x="860" y="232" text-anchor="middle" fill="#334155" font-size="9">(consume TradeSettled</text>
  <text x="860" y="247" text-anchor="middle" fill="#334155" font-size="9">from Wallet's Kafka)</text>

  <!-- REST GET arrow -->
  <line x1="730" y1="150" x2="770" y2="150" stroke="#64748b" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="750" y="143" text-anchor="middle" fill="#64748b" font-size="9">REST GET</text>
  <line x1="730" y1="498" x2="770" y2="210" stroke="#f97316" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrO)"/>

  <text x="490" y="645" text-anchor="middle" fill="#334155" font-size="10">Wallet Service is the sole owner of balances · never decides business workflow · never initiates settlement</text>
  <text x="490" y="661" text-anchor="middle" fill="#334155" font-size="10">TradeSettled is published by Wallet Service (not Settlement Service) — single authoritative Kafka source</text>
</svg>
