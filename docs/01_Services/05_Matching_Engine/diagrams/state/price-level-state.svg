<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="820" height="580" fill="url(#bg)"/>
  <rect width="820" height="580" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="410" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Price Level State</text>
  <text x="410" y="55" text-anchor="middle" fill="#64748b" font-size="12">Dynamic creation and cleanup of liquidity levels</text>
  <line x1="80" y1="66" x2="740" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- NON_EXISTENT -->
  <ellipse cx="410" cy="92" rx="12" ry="12" fill="#3b82f6"/>
  <line x1="410" y1="104" x2="410" y2="128" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="270" y="128" width="280" height="50" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="410" y="150" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">NON_EXISTENT</text>
  <text x="410" y="170" text-anchor="middle" fill="#334155" font-size="10">Price level does not exist in the book</text>

  <!-- NON_EXISTENT → ACTIVE: first order -->
  <line x1="410" y1="178" x2="410" y2="218" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="422" y="200" fill="#22c55e" font-size="10">Insert (first order at price)</text>

  <!-- ACTIVE state -->
  <rect x="240" y="218" width="340" height="130" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="240" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">ACTIVE</text>
  <line x1="270" y1="250" x2="550" y2="250" stroke="#166534" stroke-width="0.5"/>
  <text x="410" y="267" text-anchor="middle" fill="#475569" font-size="10">CreateLinkedList (if new)</text>
  <text x="410" y="283" text-anchor="middle" fill="#475569" font-size="10">InsertBinarySortedPrices → AddOrderToQueue</text>
  <text x="410" y="299" text-anchor="middle" fill="#475569" font-size="10">UpdateTotalQty</text>
  <text x="410" y="315" text-anchor="middle" fill="#334155" font-size="9">Orders stored in FIFO doubly-linked list at this price</text>
  <text x="410" y="330" text-anchor="middle" fill="#334155" font-size="9">O(log n) price insertion · O(1) order queue ops</text>
  <text x="410" y="345" text-anchor="middle" fill="#334155" font-size="9">totalQty = sum of all resting quantities at price</text>

  <!-- Self-loops on ACTIVE -->
  <!-- Add order / partial fill -->
  <path d="M 580,265 Q 660,265 660,275 Q 680,275 680,348 Q 680,348 580,348" stroke="#22c55e" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
  <text x="695" y="310" text-anchor="middle" fill="#22c55e" font-size="9">Add order /</text>
  <text x="695" y="323" text-anchor="middle" fill="#22c55e" font-size="9">partial fill</text>
  <text x="695" y="336" text-anchor="middle" fill="#166534" font-size="9">(totalQty changes)</text>

  <!-- Cancel/fill (not last) -->
  <path d="M 240,308 Q 160,308 160,318 Q 140,318 140,348 Q 140,348 240,348" stroke="#f59e0b" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arrY)"/>
  <text x="100" y="320" text-anchor="middle" fill="#f59e0b" font-size="9">Cancel/Fill</text>
  <text x="100" y="334" text-anchor="middle" fill="#78350f" font-size="9">(orders &gt; 1)</text>

  <!-- ACTIVE → CLEANUP: last order removed -->
  <line x1="410" y1="348" x2="410" y2="390" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="422" y="372" fill="#ef4444" font-size="10">Last order removed</text>

  <!-- CLEANUP -->
  <rect x="260" y="390" width="300" height="80" rx="10" fill="#1a0000" stroke="#ef4444" stroke-width="2"/>
  <text x="410" y="412" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">CLEANUP</text>
  <line x1="280" y1="422" x2="540" y2="422" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="410" y="438" text-anchor="middle" fill="#7f1d1d" font-size="10">DeleteFromPriceLevelsMap</text>
  <text x="410" y="454" text-anchor="middle" fill="#7f1d1d" font-size="10">RemoveFromSortedPricesList</text>
  <text x="410" y="470" text-anchor="middle" fill="#334155" font-size="9">Price gap closed · Memory reclaimed immediately</text>

  <line x1="410" y1="470" x2="410" y2="508" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Back to NON_EXISTENT -->
  <rect x="270" y="508" width="280" height="44" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="410" y="528" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">NON_EXISTENT</text>
  <text x="410" y="547" text-anchor="middle" fill="#334155" font-size="10">Price level gone · Next insert creates it fresh</text>

  <!-- Terminal dot -->
  <ellipse cx="410" cy="549" rx="8" ry="8" fill="#475569"/>

  <text x="410" y="575" text-anchor="middle" fill="#334155" font-size="10">Price levels are created and destroyed dynamically · No pre-allocated slots · Empty levels consume no memory</text>
</svg>
