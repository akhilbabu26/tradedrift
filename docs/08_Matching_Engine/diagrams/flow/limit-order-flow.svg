<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 820" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="820" height="820" fill="url(#bg)"/>
  <rect width="820" height="820" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="410" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Limit Order Flow</text>
  <text x="410" y="55" text-anchor="middle" fill="#64748b" font-size="12">OrderCreated (LIMIT) → Match Loop → Resting / Filled</text>
  <line x1="80" y1="66" x2="740" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Step boxes: centre column x=270..550 -->
  <!-- 1. OrderCreated received -->
  <rect x="260" y="82" width="300" height="46" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="101" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">OrderCreated (LIMIT) Received</text>
  <text x="410" y="119" text-anchor="middle" fill="#475569" font-size="10">Event dequeued from Input Queue</text>

  <line x1="410" y1="128" x2="410" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Pre-match checks -->
  <rect x="260" y="155" width="300" height="46" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="410" y="174" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Pre-Match Checks</text>
  <text x="410" y="192" text-anchor="middle" fill="#475569" font-size="10">Tick size · Lot size validation</text>

  <!-- Pre-match fail branch -->
  <line x1="560" y1="178" x2="640" y2="178" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="598" y="170" text-anchor="middle" fill="#ef4444" font-size="10">FAIL</text>
  <rect x="640" y="158" width="140" height="40" rx="7" fill="#1a0000" stroke="#ef4444" stroke-width="1.2"/>
  <text x="710" y="176" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">OrderCancelled</text>
  <text x="710" y="190" text-anchor="middle" fill="#7f1d1d" font-size="10">invalid_order_parameters</text>

  <line x1="410" y1="201" x2="410" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Crossable check -->
  <polygon points="410,228 560,258 410,288 260,258" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="254" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Book Crossable?</text>
  <text x="410" y="272" text-anchor="middle" fill="#78350f" font-size="10">best opposite price ≥ incoming price</text>

  <!-- No match → insert resting -->
  <line x1="260" y1="258" x2="120" y2="258" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrY)"/>
  <text x="190" y="248" text-anchor="middle" fill="#f59e0b" font-size="10">NO CROSS</text>
  <rect x="40" y="330" width="160" height="70" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="353" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Insert as Resting</text>
  <text x="120" y="370" text-anchor="middle" fill="#475569" font-size="10">Add to Price Level</text>
  <text x="120" y="385" text-anchor="middle" fill="#475569" font-size="10">Index in OrderIndex</text>
  <line x1="120" y1="258" x2="120" y2="330" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrY)"/>

  <!-- YES → Match loop -->
  <line x1="410" y1="288" x2="410" y2="335" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="420" y="315" fill="#22c55e" font-size="10">CROSSES</text>

  <!-- Match loop box -->
  <rect x="260" y="335" width="300" height="60" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="358" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Match Loop: ExecuteBest()</text>
  <text x="410" y="374" text-anchor="middle" fill="#475569" font-size="10">fill qty = min(incoming.remaining, resting.qty)</text>
  <text x="410" y="388" text-anchor="middle" fill="#475569" font-size="10">price = maker's (resting) price</text>

  <line x1="410" y1="395" x2="410" y2="425" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TradeExecuted emitted -->
  <rect x="260" y="425" width="300" height="44" rx="8" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="410" y="445" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">TradeExecuted emitted</text>
  <text x="410" y="461" text-anchor="middle" fill="#78350f" font-size="10">trade_id (UUIDv7) · price · quantity</text>

  <line x1="410" y1="469" x2="410" y2="497" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- More to fill? -->
  <polygon points="410,497 560,525 410,553 260,525" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="521" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Still remaining qty?</text>
  <text x="410" y="539" text-anchor="middle" fill="#78350f" font-size="10">And book still crosses?</text>

  <!-- Yes → loop back -->
  <line x1="560" y1="525" x2="660" y2="525" stroke="#f59e0b" stroke-width="1.3"/>
  <line x1="660" y1="525" x2="660" y2="365" stroke="#f59e0b" stroke-width="1.3"/>
  <line x1="660" y1="365" x2="560" y2="365" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrY)"/>
  <text x="680" y="448" text-anchor="middle" fill="#f59e0b" font-size="10" transform="rotate(-90 680 448)">NEXT LEVEL</text>

  <line x1="410" y1="553" x2="410" y2="598" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="422" y="577" fill="#22c55e" font-size="10">FULLY FILLED</text>
  <!-- Partially filled branch -->
  <line x1="260" y1="525" x2="120" y2="525" stroke="#a855f7" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="190" y="515" text-anchor="middle" fill="#a855f7" font-size="10">PARTIAL + NO CROSS</text>
  <rect x="40" y="480" width="160" height="60" rx="8" fill="#1a0a2e" stroke="#a855f7" stroke-width="1.2"/>
  <text x="120" y="505" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">Insert Remainder</text>
  <text x="120" y="522" text-anchor="middle" fill="#6b21a8" font-size="10">as new resting order</text>
  <text x="120" y="535" text-anchor="middle" fill="#6b21a8" font-size="10">at original limit price</text>

  <!-- Fully filled terminal -->
  <rect x="310" y="598" width="200" height="44" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="618" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Fully Filled</text>
  <text x="410" y="635" text-anchor="middle" fill="#166534" font-size="10">Removed from book and OrderIndex</text>

  <line x1="410" y1="642" x2="410" y2="680" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrG)"/>

  <!-- MatchResult -->
  <rect x="260" y="680" width="300" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.3"/>
  <text x="410" y="700" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">MatchResult → Output Queue</text>
  <text x="410" y="716" text-anchor="middle" fill="#334155" font-size="10">→ Publisher → Kafka trades.executed</text>

  <!-- Sweep note -->
  <rect x="40" y="620" width="165" height="55" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="122" y="638" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Sweep Note</text>
  <text x="122" y="653" text-anchor="middle" fill="#334155" font-size="9">One incoming order may</text>
  <text x="122" y="665" text-anchor="middle" fill="#334155" font-size="9">cross multiple price levels</text>
  <text x="122" y="677" text-anchor="middle" fill="#334155" font-size="9">→ multiple TradeExecuted</text>

  <text x="410" y="772" text-anchor="middle" fill="#334155" font-size="10">Price = maker (resting) price always · Each fill has its own trade_id · Trades are never merged</text>
</svg>
