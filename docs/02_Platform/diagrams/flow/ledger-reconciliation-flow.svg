<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
  </defs>
  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Ledger Reconciliation Pipeline</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Periodic Verification Loop → Mathematical Ledger Checks → Automated Fail-Safe Triggers</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Start Trigger -->
  <rect x="330" y="82" width="240" height="42" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="108" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Reconciliation Run (01:00 UTC / Hourly)</text>

  <line x1="450" y1="124" x2="450" y2="152" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Check 1: Invariant available+reserved==total -->
  <rect x="290" y="152" width="320" height="50" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="174" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">① Wallet Balance Invariant Check</text>
  <text x="450" y="188" text-anchor="middle" fill="#94a3b8" font-size="9">Verify: available_balance + reserved_balance == total_balance</text>

  <line x1="450" y1="202" x2="450" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="450,228 520,252 450,276 380,252" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="256" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Pass?</text>

  <!-- Check 1 Fail -->
  <line x1="380" y1="252" x2="200" y2="252" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="290" y="244" text-anchor="middle" fill="#ef4444" font-size="10">NO (Mismatch!)</text>

  <!-- Check 1 Pass -> Check 2 -->
  <line x1="450" y1="276" x2="450" y2="304" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="465" y="292" fill="#22c55e" font-size="10">YES</text>

  <!-- Check 2: Sum ledger CREDITS/DEBITS -->
  <rect x="290" y="304" width="320" height="50" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="326" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">② Transaction History Math Check</text>
  <text x="450" y="340" text-anchor="middle" fill="#94a3b8" font-size="9">Verify: seed + sum(credits) - sum(debits) == current_total</text>

  <line x1="450" y1="354" x2="450" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="450,380 520,404 450,428 380,404" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="408" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Pass?</text>

  <!-- Check 2 Fail -->
  <line x1="380" y1="404" x2="200" y2="404" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="290" y="396" text-anchor="middle" fill="#ef4444" font-size="10">NO (Mismatch!)</text>

  <!-- P0 SRE Alert & Freeze -->
  <rect x="20" y="222" width="180" height="212" rx="8" fill="#1b0c0c" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="246" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700">FAIL-SAFE TRIGGERED</text>
  <line x1="30" y1="256" x2="190" y2="256" stroke="#991b1b" stroke-width="0.5"/>
  
  <rect x="35" y="270" width="150" height="38" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="293" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">1. Trigger P0 SRE Alarm</text>
  
  <rect x="35" y="322" width="150" height="38" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="345" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">2. Halt Trading Engine</text>

  <rect x="35" y="374" width="150" height="42" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="397" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">3. Freeze wallet updates</text>
  <text x="110" y="410" text-anchor="middle" fill="#ef4444" font-size="8">Set wallets.is_frozen = TRUE</text>

  <!-- Check 2 Pass -> Check 3 -->
  <line x1="450" y1="428" x2="450" y2="456" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="465" y="444" fill="#22c55e" font-size="10">YES</text>

  <!-- Check 3: Active reservation to Order Service check -->
  <rect x="290" y="456" width="320" height="50" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="478" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">③ Order Reservation Consistency Check</text>
  <text x="450" y="492" text-anchor="middle" fill="#94a3b8" font-size="9">Verify: active reservation remaining_amount == order.remaining_quantity</text>

  <line x1="450" y1="506" x2="450" y2="532" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Success Audit OK -->
  <rect x="310" y="532" width="280" height="40" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="556" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Audit PASSED — Log OK &amp; Save Snapshot</text>
</svg>
