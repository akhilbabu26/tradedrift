<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" width="720" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect width="720" height="620" fill="url(#bg)" rx="12"/>

  <text x="360" y="36" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="16" font-weight="bold">Market Service — Candle Aggregation Flow</text>
  <text x="360" y="54" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Kafka consumer · TradeExecuted on-write aggregation logic</text>

  <!-- Step 1: Consume -->
  <rect x="210" y="80" width="300" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="101" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">1. Consume TradeExecuted Event</text>
  <text x="360" y="119" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="9">trade_id, price, quantity, executed_at, market_id</text>

  <line x1="360" y1="132" x2="360" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Log trade / Deduplicate -->
  <rect x="210" y="160" width="300" height="52" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="360" y="181" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold">2. Log Trade &amp; Deduplicate</text>
  <text x="360" y="197" text-anchor="middle" fill="#0c4a6e" font-family="monospace" font-size="9">INSERT INTO market_trades ON CONFLICT DO NOTHING</text>

  <!-- Duplicate path -->
  <line x1="510" y1="186" x2="590" y2="186" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="550" y="180" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8">duplicate</text>
  <rect x="590" y="165" width="115" height="40" rx="6" fill="#1e293b" stroke="#7f1d1d" stroke-width="1.2"/>
  <text x="647" y="184" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9" font-weight="bold">No-op</text>
  <text x="647" y="196" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">ACK offset</text>

  <line x1="360" y1="212" x2="360" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="226" fill="#22c55e" font-family="monospace" font-size="8">new trade</text>

  <!-- Step 3: CTE Batch Aggregation -->
  <rect x="180" y="240" width="360" height="150" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="260" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold">3. CTE Batch Aggregation (1m resolution)</text>
  <text x="200" y="285" fill="#cbd5e1" font-family="monospace" font-size="9">a. Buffer events in-memory (up to 100ms or 100 events)</text>
  <text x="200" y="300" fill="#cbd5e1" font-family="monospace" font-size="9">b. Flush buffer via single atomic CTE Postgres query:</text>
  <text x="220" y="315" fill="#64748b" font-family="monospace" font-size="8">- INSERT INTO market_trades ON CONFLICT DO NOTHING</text>
  <text x="220" y="330" fill="#64748b" font-family="monospace" font-size="8">- RETURNING filter returns only newly inserted unique trades</text>
  <text x="220" y="345" fill="#64748b" font-family="monospace" font-size="8">- Aggregate returned trades &amp; UPSERT 1m ohlc_candles</text>
  <text x="200" y="368" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold">c. Commit batch (higher resolutions rolled up by Cron)</text>

  <line x1="360" y1="390" x2="360" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: ACK -->
  <rect x="210" y="420" width="300" height="52" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="441" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">4. ACK Kafka Offset</text>
  <text x="360" y="457" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">commits offset to partition</text>

  <line x1="360" y1="472" x2="360" y2="500" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- Done -->
  <rect x="260" y="500" width="200" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="360" y="515" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">✓ Done</text>
  <text x="360" y="531" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="9">charts updated instantly</text>

  <!-- Footer info -->
  <rect x="30" y="565" width="660" height="40" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="360" y="580" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">Deduplication on market_trades table prevents volume corruption on partition offset replays</text>
  <text x="360" y="594" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">Atomic writes guarantee that either all resolutions reflect the trade or none do</text>
</svg>
