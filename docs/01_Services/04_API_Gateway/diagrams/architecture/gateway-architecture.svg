<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
  </defs>
  <rect width="860" height="600" fill="url(#bg)"/>
  <rect width="860" height="600" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">API Gateway Deployment Topology</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">Stateless Ingress Routing · Shared Redis Cache Rate-Limiter · Internal gRPC Mesh</text>
  <line x1="80" y1="66" x2="780" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Public Clients -->
  <rect x="50" y="240" width="130" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="275" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700">Clients</text>
  <text x="115" y="295" text-anchor="middle" fill="#64748b" font-size="10">Web / Mobile Apps</text>

  <line x1="180" y1="280" x2="230" y2="280" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Load Balancer -->
  <rect x="230" y="220" width="100" height="120" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="280" y="270" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">Load</text>
  <text x="280" y="290" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">Balancer</text>
  <text x="280" y="308" text-anchor="middle" fill="#475569" font-size="9">AWS NLB / Nginx</text>

  <!-- Forwarding from LB to stateless gateways -->
  <path d="M 330,260 L 400,190" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 330,280 L 400,280" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 330,300 L 400,370" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Gateway Pod 1 -->
  <rect x="400" y="140" width="180" height="66" rx="8" fill="#0c1020" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="170" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">API Gateway Pod 1</text>
  <text x="490" y="186" text-anchor="middle" fill="#3b82f6" font-size="9">Stateless Routing Instance</text>

  <!-- Gateway Pod 2 -->
  <rect x="400" y="247" width="180" height="66" rx="8" fill="#0c1020" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="277" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">API Gateway Pod 2</text>
  <text x="490" y="293" text-anchor="middle" fill="#3b82f6" font-size="9">Stateless Routing Instance</text>

  <!-- Gateway Pod 3 -->
  <rect x="400" y="354" width="180" height="66" rx="8" fill="#0c1020" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="384" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">API Gateway Pod N</text>
  <text x="490" y="400" text-anchor="middle" fill="#3b82f6" font-size="9">Horizontal Scaling Pods</text>

  <!-- Shared Redis rate limit -->
  <rect x="360" y="480" width="260" height="52" rx="8" fill="#1b0c0c" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="505" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Shared Redis Cluster</text>
  <text x="490" y="520" text-anchor="middle" fill="#78350f" font-size="9">Rate Limit Token Buckets · Blacklist Tokens Cache</text>

  <path d="M 430,206 Q 340,240 370,480" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 430,313 Q 340,340 380,480" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 430,420 Q 340,440 390,480" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- gRPC internal routes forward -->
  <path d="M 580,173 L 680,240" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 580,280 L 680,280" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 580,387 L 680,320" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Downstream Services cluster -->
  <rect x="680" y="200" width="140" height="180" rx="8" fill="#0b1a0b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="224" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="700">Internal Mesh</text>
  <line x1="695" y1="234" x2="805" y2="234" stroke="#166534" stroke-width="0.5"/>
  
  <rect x="695" y="244" width="110" height="24" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="260" text-anchor="middle" fill="#86efac" font-size="9">Auth Service</text>

  <rect x="695" y="276" width="110" height="24" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="292" text-anchor="middle" fill="#86efac" font-size="9">Order Service</text>

  <rect x="695" y="308" width="110" height="24" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="324" text-anchor="middle" fill="#86efac" font-size="9">Wallet Service</text>

  <rect x="695" y="340" width="110" height="24" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="356" text-anchor="middle" fill="#86efac" font-size="9">Market Service</text>

  <text x="750" y="394" text-anchor="middle" fill="#475569" font-size="8">mTLS Encrypted</text>
</svg>
