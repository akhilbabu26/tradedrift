<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="820" height="640" fill="url(#bg)"/>
  <rect width="820" height="640" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="410" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Cancel Order Flow</text>
  <text x="410" y="55" text-anchor="middle" fill="#64748b" font-size="12">OrderCancelRequested → Lookup → Cancel → Release</text>
  <line x1="80" y1="66" x2="740" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- 1. Received -->
  <rect x="255" y="82" width="310" height="46" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="410" y="101" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="600">OrderCancelRequested Received</text>
  <text x="410" y="119" text-anchor="middle" fill="#475569" font-size="10">Dequeued by Event Loop · carries order_id + market_id</text>

  <line x1="410" y1="128" x2="410" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. OrderIndex lookup -->
  <rect x="255" y="155" width="310" height="46" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="410" y="174" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">OrderIndex.Get(order_id)</text>
  <text x="410" y="192" text-anchor="middle" fill="#475569" font-size="10">O(1) HashMap lookup for the OrderNode pointer</text>

  <line x1="410" y1="201" x2="410" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Found? -->
  <polygon points="410,228 560,256 410,284 260,256" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="252" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Order Found in Index?</text>

  <!-- NOT FOUND -->
  <line x1="260" y1="256" x2="120" y2="256" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="190" y="246" text-anchor="middle" fill="#ef4444" font-size="10">NOT FOUND</text>
  <rect x="20" y="228" width="180" height="56" rx="8" fill="#1a0000" stroke="#ef4444" stroke-width="1.3"/>
  <text x="110" y="248" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">No-Op + Log</text>
  <text x="110" y="265" text-anchor="middle" fill="#7f1d1d" font-size="10">Order already filled/cancelled</text>
  <text x="110" y="280" text-anchor="middle" fill="#7f1d1d" font-size="10">or was never in this book</text>

  <!-- Found → cancel -->
  <line x1="410" y1="284" x2="410" y2="320" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="422" y="305" fill="#22c55e" font-size="10">FOUND</text>

  <!-- Remove from price level -->
  <rect x="255" y="320" width="310" height="50" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="341" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Remove from Price Level</text>
  <text x="410" y="358" text-anchor="middle" fill="#475569" font-size="10">O(1) doubly-linked list splice · update totalQty</text>
  <text x="410" y="373" text-anchor="middle" fill="#475569" font-size="10">If last order at price → delete price level</text>

  <line x1="410" y1="370" x2="410" y2="398" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Remove from OrderIndex -->
  <rect x="255" y="398" width="310" height="42" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="410" y="418" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">OrderIndex.Delete(order_id)</text>
  <text x="410" y="436" text-anchor="middle" fill="#475569" font-size="10">Remove pointer from HashMap</text>

  <line x1="410" y1="440" x2="410" y2="468" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OrderCancelled emitted -->
  <rect x="255" y="468" width="310" height="52" rx="8" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
  <text x="410" y="488" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">OrderCancelled emitted</text>
  <text x="410" y="505" text-anchor="middle" fill="#7f1d1d" font-size="10">reason: user_requested</text>
  <text x="410" y="521" text-anchor="middle" fill="#7f1d1d" font-size="10">remaining_quantity = node.remainingQty</text>

  <line x1="410" y1="520" x2="410" y2="552" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Consumed by Order Service -->
  <rect x="160" y="552" width="500" height="46" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.3"/>
  <text x="410" y="572" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Order Service consumes OrderCancelled</text>
  <text x="410" y="588" text-anchor="middle" fill="#166534" font-size="10">→ Wallet.ReleaseFunds(order_id) · remaining_quantity returned to available balance</text>

  <text x="410" y="624" text-anchor="middle" fill="#334155" font-size="10">Cancel is a single atomic O(1) operation · No matching logic runs · Event Loop is not blocked</text>
</svg>
