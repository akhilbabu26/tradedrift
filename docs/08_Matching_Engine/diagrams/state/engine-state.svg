<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="900" height="700" fill="url(#bg)"/>
  <rect width="900" height="700" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Engine State — Market Engine Lifecycle</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Per-market state machine · Startup → Recovery → Live → Halt</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Initial dot -->
  <ellipse cx="450" cy="92" rx="12" ry="12" fill="#3b82f6"/>
  <line x1="450" y1="104" x2="450" y2="126" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="465" y="117" fill="#64748b" font-size="10">Process Start / Assign Partition</text>

  <!-- STARTING -->
  <rect x="300" y="126" width="300" height="80" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="148" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">STARTING</text>
  <line x1="360" y1="158" x2="540" y2="158" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="450" y="173" text-anchor="middle" fill="#475569" font-size="10">LoadConfig</text>
  <text x="450" y="188" text-anchor="middle" fill="#475569" font-size="10">ConnectKafka → ConnectPostgres</text>
  <text x="450" y="203" text-anchor="middle" fill="#334155" font-size="9">join consumer group · receive partition assignment</text>

  <line x1="450" y1="206" x2="450" y2="230" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="465" y="221" fill="#22c55e" font-size="10">Connect Success</text>

  <!-- LOADING_CHECKPOINT -->
  <rect x="280" y="230" width="340" height="70" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">LOADING_CHECKPOINT</text>
  <line x1="310" y1="262" x2="590" y2="262" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="450" y="277" text-anchor="middle" fill="#475569" font-size="10">ReadRow from PostgreSQL</text>
  <text x="450" y="293" text-anchor="middle" fill="#334155" font-size="9">If absent: checkpointOffset = −1 (first boot)</text>

  <line x1="450" y1="300" x2="450" y2="324" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="465" y="314" fill="#3b82f6" font-size="10">Seek to Offset 0</text>

  <!-- RECOVERY -->
  <rect x="270" y="324" width="360" height="90" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="346" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">RECOVERY</text>
  <line x1="300" y1="356" x2="600" y2="356" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="450" y="372" text-anchor="middle" fill="#475569" font-size="10">FetchReplayEvent → ProcessInMemory</text>
  <text x="450" y="388" text-anchor="middle" fill="#475569" font-size="10">Output suppressed · No Kafka/Redis/Metrics</text>
  <text x="450" y="404" text-anchor="middle" fill="#334155" font-size="9">Loop until offset == checkpointOffset</text>

  <!-- Self-loop on RECOVERY -->
  <path d="M 630,370 Q 700,370 700,370 Q 720,370 720,414 Q 720,414 630,414" stroke="#f59e0b" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arrY)"/>
  <text x="730" y="393" fill="#f59e0b" font-size="9">offset &lt; hwm</text>

  <line x1="450" y1="414" x2="450" y2="444" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="465" y="432" fill="#22c55e" font-size="10">Caught up · Send Sentinel</text>

  <!-- LIVE -->
  <rect x="280" y="444" width="340" height="80" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="466" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">LIVE</text>
  <line x1="310" y1="476" x2="590" y2="476" stroke="#166534" stroke-width="0.5"/>
  <text x="450" y="492" text-anchor="middle" fill="#4ade80" font-size="10">FetchLiveEvent → ProcessLive</text>
  <text x="450" y="508" text-anchor="middle" fill="#475569" font-size="10">Kafka publish · Redis snapshot · Metrics active</text>
  <text x="450" y="522" text-anchor="middle" fill="#334155" font-size="9">Checkpoint written per match after Kafka ACK</text>

  <!-- Self-loop LIVE -->
  <path d="M 620,484 Q 700,484 700,484 Q 720,484 720,524 Q 720,524 620,524" stroke="#22c55e" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
  <text x="725" y="505" fill="#22c55e" font-size="9">next event</text>

  <!-- LIVE → HALTED (panic) -->
  <line x1="620" y1="484" x2="770" y2="570" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="718" y="524" text-anchor="middle" fill="#ef4444" font-size="10">Panic Caught</text>

  <!-- RECOVERY → HALTED (panic) -->
  <line x1="630" y1="370" x2="770" y2="570" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
  <text x="720" y="460" text-anchor="middle" fill="#ef4444" font-size="9">Panic (Recovery)</text>

  <!-- HALTED -->
  <rect x="640" y="570" width="220" height="80" rx="10" fill="#1a0000" stroke="#ef4444" stroke-width="2"/>
  <text x="750" y="592" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">HALTED</text>
  <line x1="660" y1="602" x2="850" y2="602" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="750" y="617" text-anchor="middle" fill="#7f1d1d" font-size="10">StopEventLoop</text>
  <text x="750" y="632" text-anchor="middle" fill="#7f1d1d" font-size="10">PublishHaltEvent · RaiseP1Alert</text>
  <text x="750" y="647" text-anchor="middle" fill="#7f1d1d" font-size="9">Operator intervention required</text>

  <!-- HALTED → STARTING (operator restart) -->
  <line x1="640" y1="610" x2="270" y2="166" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="6,4" marker-end="url(#arrB)"/>
  <text x="90" y="460" text-anchor="middle" fill="#3b82f6" font-size="10" transform="rotate(-70 90 460)">Operator Triggered Restart</text>

  <text x="450" y="665" text-anchor="middle" fill="#334155" font-size="10">Each market partition runs an independent state machine · Panic in one market halts only that engine</text>
  <text x="450" y="681" text-anchor="middle" fill="#334155" font-size="10">Other market engines continue operating unaffected</text>
</svg>
