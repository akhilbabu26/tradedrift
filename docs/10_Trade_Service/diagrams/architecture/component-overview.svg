<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="kafkaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="17" font-weight="bold">Trade Service — Component Overview</text>
  <text x="450" y="56" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">V1 · Read-side projection of TradeSettled · No Kafka publishing</text>

  <!-- ── Upstream chain ── -->
  <!-- Matching Engine -->
  <rect x="30" y="90" width="155" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="107" y="112" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">Matching Engine</text>
  <text x="107" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">publishes TradeExecuted</text>

  <!-- arrow ME → Settlement -->
  <line x1="185" y1="116" x2="240" y2="116" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="212" y="110" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">gRPC</text>

  <!-- Settlement Service -->
  <rect x="240" y="90" width="155" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="317" y="112" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">Settlement Service</text>
  <text x="317" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">calls SettleTrade(+market_id)</text>

  <!-- arrow Settlement → Wallet -->
  <line x1="395" y1="116" x2="450" y2="116" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="422" y="110" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">gRPC</text>

  <!-- Wallet Service -->
  <rect x="450" y="90" width="155" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="527" y="112" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">Wallet Service</text>
  <text x="527" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">commits + outbox → TradeSettled</text>

  <!-- arrow Wallet → Kafka -->
  <line x1="527" y1="142" x2="527" y2="185" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrKafka)"/>

  <!-- Kafka TradeSettled -->
  <rect x="340" y="185" width="375" height="52" rx="8" fill="url(#kafkaGrad)" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="527" y="207" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow)">Kafka: TradeSettled</text>
  <text x="527" y="224" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="9">partition key: market_id · at-least-once</text>

  <!-- Three downstream consumers -->
  <!-- Trade Service (highlighted) -->
  <line x1="430" y1="237" x2="370" y2="290" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <rect x="280" y="290" width="180" height="120" rx="10" fill="url(#tsGrad)" opacity="0.18" stroke="#0ea5e9" stroke-width="2"/>
  <text x="370" y="315" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold">Trade Service</text>
  <text x="370" y="333" text-anchor="middle" fill="#7dd3fc" font-family="monospace" font-size="9">this document</text>
  <text x="370" y="351" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">consume → INSERT trades</text>
  <text x="370" y="367" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">ON CONFLICT DO NOTHING</text>
  <text x="370" y="385" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">→ REST + gRPC read API</text>
  <text x="370" y="400" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">no Kafka publishing</text>

  <!-- Portfolio Service -->
  <line x1="527" y1="237" x2="527" y2="290" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <rect x="455" y="290" width="145" height="72" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="527" y="314" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">Portfolio Service</text>
  <text x="527" y="330" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">PnL · holdings</text>
  <text x="527" y="348" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">→ PortfolioUpdated</text>

  <!-- Notification Service -->
  <line x1="624" y1="237" x2="684" y2="290" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <rect x="625" y="290" width="145" height="72" rx="8" fill="#1e293b" stroke="#065f46" stroke-width="1.5"/>
  <text x="697" y="314" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">Notification Service</text>
  <text x="697" y="330" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">push to client</text>
  <text x="697" y="348" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">→ WebSocket</text>

  <!-- ── Trade Service internals ── -->
  <!-- DB -->
  <rect x="30" y="290" width="215" height="100" rx="8" fill="#1e293b" stroke="#1e40af" stroke-width="1.5"/>
  <text x="137" y="315" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">PostgreSQL — trades table</text>
  <text x="137" y="333" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">id UUID PK (= trade_id)</text>
  <text x="137" y="349" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">idx: buyer_id · seller_id · market_id</text>
  <text x="137" y="365" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">DECIMAL(30,10) · append-only</text>
  <text x="137" y="381" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">executed_at + settled_at</text>

  <!-- arrow Trade Service ↔ DB -->
  <line x1="280" y1="355" x2="245" y2="355" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="262" y="349" text-anchor="middle" fill="#0ea5e9" font-family="monospace" font-size="8">write</text>

  <!-- REST API box -->
  <rect x="30" y="420" width="215" height="80" rx="8" fill="#1e293b" stroke="#0f766e" stroke-width="1.5"/>
  <text x="137" y="443" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="10" font-weight="bold">REST API (read-only)</text>
  <text x="137" y="460" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">GET /trades  (auth)</text>
  <text x="137" y="476" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">GET /trades/{id}  (auth)</text>
  <text x="137" y="492" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">GET /markets/{id}/trades  (public)</text>

  <!-- arrow DB → REST -->
  <line x1="137" y1="390" x2="137" y2="420" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="153" y="410" text-anchor="middle" fill="#0ea5e9" font-family="monospace" font-size="8">read</text>

  <!-- gRPC box -->
  <rect x="280" y="440" width="180" height="60" rx="8" fill="#1e293b" stroke="#1e40af" stroke-width="1.5"/>
  <text x="370" y="462" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">gRPC API (internal)</text>
  <text x="370" y="479" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">GetTrade · ListUserTrades</text>
  <text x="370" y="492" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">ListMarketTrades</text>

  <!-- arrow Trade Service → REST/gRPC -->
  <line x1="370" y1="410" x2="370" y2="440" stroke="#0ea5e9" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrBlue)"/>

  <!-- Invariants legend -->
  <rect x="490" y="420" width="380" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="680" y="443" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">Service Invariants</text>
  <text x="510" y="463" fill="#64748b" font-family="monospace" font-size="9">TI-1  trades is append-only — no UPDATE / DELETE</text>
  <text x="510" y="480" fill="#64748b" font-family="monospace" font-size="9">TI-2  Kafka-only writes — no REST / gRPC write path</text>
  <text x="510" y="497" fill="#64748b" font-family="monospace" font-size="9">TI-3  ON CONFLICT DO NOTHING — idempotent consumer</text>
  <text x="510" y="514" fill="#64748b" font-family="monospace" font-size="9">TI-4  no Kafka publishing — no outbox table</text>
  <text x="510" y="531" fill="#64748b" font-family="monospace" font-size="9">TI-5  user endpoints enforce buyer/seller membership</text>
  <text x="510" y="548" fill="#64748b" font-family="monospace" font-size="9">       public feed strips buyer_id / seller_id</text>

  <!-- Footer -->
  <text x="450" y="600" text-anchor="middle" fill="#334155" font-family="monospace" font-size="9">TradeDrift Trade Service V1 · source of truth: TradeSettled · trade_id owned by Matching Engine (UUIDv7)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrKafka" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
  </defs>
</svg>
