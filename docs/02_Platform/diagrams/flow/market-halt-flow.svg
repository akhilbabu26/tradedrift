<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Market Halt Circuit Breaker Flow</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Emergency Circuit Breaker → Matching Engine Frozen → Ingress Validation Filtering</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- SRE Console -->
  <rect x="360" y="82" width="180" height="40" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="106" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">SRE Trigger: HaltMarket(symbol)</text>

  <line x1="450" y1="122" x2="450" y2="152" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Matching Engine -->
  <rect x="300" y="152" width="300" height="74" rx="8" fill="#1b0c0c" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="176" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Matching Engine (in-memory)</text>
  <line x1="315" y1="184" x2="585" y2="184" stroke="#78350f" stroke-width="0.5"/>
  <text x="450" y="200" text-anchor="middle" fill="#f59e0b" font-size="10">Set Symbol status = HALTED</text>
  <text x="450" y="213" text-anchor="middle" fill="#22c55e" font-size="9">Publish MarketHalted Event (Kafka)</text>

  <!-- Kafka Market Halted -->
  <path d="M 600,190 L 730,190 L 730,268" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  
  <!-- Order Service / Gateway Cache -->
  <rect x="630" y="268" width="200" height="66" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="292" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700">Order Service &amp; Gateway</text>
  <text x="730" y="308" text-anchor="middle" fill="#166534" font-size="9">Consumes MarketHalted</text>
  <text x="730" y="322" text-anchor="middle" fill="#475569" font-size="8">Caches symbol state (is_enabled=FALSE)</text>

  <!-- Client incoming order path -->
  <rect x="630" y="440" width="200" height="42" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="730" y="466" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Client POST /orders</text>

  <line x1="730" y1="440" x2="730" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="745" y="400" fill="#64748b" font-size="10">Check Cache</text>

  <!-- Gateway Reject path -->
  <line x1="730" y1="268" x2="730" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <rect x="640" y="174" width="180" height="36" rx="6" fill="#1b0c0c" stroke="#ef4444" stroke-width="1.3"/>
  <text x="730" y="196" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Reject: 503 Service Unavailable</text>

  <!-- Stream processing while halted -->
  <line x1="450" y1="226" x2="450" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="250" y="260" width="400" height="24" rx="6" fill="#0f172a" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="276" text-anchor="middle" fill="#cbd5e1" font-size="10">Kafka queue events ingested while symbol is HALTED</text>

  <!-- Ingested split paths -->
  <path d="M 450,284 L 450,320 L 250,320 L 250,340" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="310" y="312" text-anchor="middle" fill="#cbd5e1" font-size="9">If OrderCreated</text>

  <path d="M 450,284 L 450,320 L 650,320 L 650,340" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="585" y="312" text-anchor="middle" fill="#cbd5e1" font-size="9">If OrderCancelRequested</text>

  <!-- OrderCreated Path -> Reject -->
  <rect x="150" y="340" width="200" height="74" rx="8" fill="#1b0c0c" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="364" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Immediate Rejection</text>
  <line x1="165" y1="372" x2="335" y2="372" stroke="#991b1b" stroke-width="0.5"/>
  <text x="250" y="388" text-anchor="middle" fill="#fca5a5" font-size="9">Publish OrderCancelled event</text>
  <text x="250" y="401" text-anchor="middle" fill="#fca5a5" font-size="8">reason: "market_halted" · funds released</text>

  <!-- OrderCancelRequested Path -> Process -->
  <rect x="550" y="340" width="200" height="74" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="650" y="364" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">Process Normally</text>
  <line x1="565" y1="372" x2="735" y2="372" stroke="#166534" stroke-width="0.5"/>
  <text x="650" y="388" text-anchor="middle" fill="#4ade80" font-size="9">Remove order from book if found</text>
  <text x="650" y="401" text-anchor="middle" fill="#4ade80" font-size="8">Publish OrderCancelled (user_requested)</text>

  <!-- Connection line to return -->
  <path d="M 250,414 L 250,446 M 650,414 L 650,446" fill="none" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Invariants box -->
  <rect x="50" y="520" width="800" height="88" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.3"/>
  <text x="450" y="540" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Halt Circuit Invariants</text>
  <text x="90" y="560" fill="#475569" font-size="10">① Order cancellations are always processed, even when trading is halted, to allow users to manage capital risk.</text>
  <text x="90" y="576" fill="#475569" font-size="10">② The API Gateway caches halted statuses with a 10s TTL, fending off spam orders at the edge to protect Kafka queues.</text>
  <text x="90" y="592" fill="#475569" font-size="10">③ Matches are frozen immediately. Orders that slipped into Kafka before the halt are safely cancelled with outbox events.</text>
</svg>
