<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/></marker>
  </defs>
  <rect width="900" height="640" fill="url(#bg)"/>
  <rect width="900" height="640" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Publisher Flow</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Output Queue → Kafka · Redis · PostgreSQL Checkpoint</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Output Queue -->
  <rect x="300" y="82" width="300" height="46" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="101" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">Output Queue</text>
  <text x="450" y="119" text-anchor="middle" fill="#475569" font-size="10">Buffered channel · Written by Event Loop · Read by Publisher</text>

  <line x1="450" y1="128" x2="450" y2="154" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Publisher goroutine -->
  <rect x="280" y="154" width="340" height="56" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="175" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Publisher Goroutine</text>
  <text x="450" y="193" text-anchor="middle" fill="#475569" font-size="10">Reads MatchResult from Output Queue</text>
  <text x="450" y="208" text-anchor="middle" fill="#475569" font-size="10">Runs independently of Event Loop · Never holds book locks</text>

  <!-- Three branches from Publisher -->
  <line x1="340" y1="210" x2="160" y2="278" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="450" y1="210" x2="450" y2="278" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="560" y1="210" x2="740" y2="278" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Branch A: Kafka publish -->
  <rect x="40" y="278" width="240" height="110" rx="8" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="160" y="298" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">A. Kafka Publish</text>
  <text x="160" y="315" text-anchor="middle" fill="#78350f" font-size="10">TradeExecuted → trades.executed</text>
  <text x="160" y="330" text-anchor="middle" fill="#78350f" font-size="10">OrderCancelled → orders.cancelled</text>
  <rect x="60" y="340" width="200" height="28" rx="5" fill="#111" stroke="#7f1d1d"/>
  <text x="160" y="358" text-anchor="middle" fill="#ef4444" font-size="10">Wait for broker ACK before checkpoint</text>

  <!-- Branch B: Redis -->
  <rect x="320" y="278" width="260" height="110" rx="8" fill="#0e0a24" stroke="#a855f7" stroke-width="1.5"/>
  <text x="450" y="298" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">B. Redis Snapshot</text>
  <text x="450" y="315" text-anchor="middle" fill="#6b21a8" font-size="10">Push order book depth snapshot</text>
  <text x="450" y="330" text-anchor="middle" fill="#6b21a8" font-size="10">after each match result</text>
  <text x="450" y="345" text-anchor="middle" fill="#6b21a8" font-size="10">→ consumed by Market Data / WS</text>
  <rect x="335" y="357" width="230" height="22" rx="5" fill="#111" stroke="#4c1d95"/>
  <text x="450" y="372" text-anchor="middle" fill="#7c3aed" font-size="10">Best-effort · failure does not block Kafka</text>

  <!-- Branch C: Checkpoint -->
  <rect x="620" y="278" width="240" height="110" rx="8" fill="#0f1a00" stroke="#84cc16" stroke-width="1.5"/>
  <text x="740" y="298" text-anchor="middle" fill="#bef264" font-size="12" font-weight="600">C. PostgreSQL Checkpoint</text>
  <text x="740" y="315" text-anchor="middle" fill="#365314" font-size="10">{topic, partition, offset}</text>
  <text x="740" y="330" text-anchor="middle" fill="#365314" font-size="10">Written AFTER Kafka ACK</text>
  <text x="740" y="345" text-anchor="middle" fill="#365314" font-size="10">One row per partition · upsert</text>
  <rect x="635" y="357" width="210" height="22" rx="5" fill="#111" stroke="#365314"/>
  <text x="740" y="372" text-anchor="middle" fill="#84cc16" font-size="10">Written per successful match, not per event</text>

  <!-- Sequence note below -->
  <rect x="80" y="415" width="740" height="100" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="450" y="436" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Critical Ordering Guarantee</text>
  <text x="450" y="456" text-anchor="middle" fill="#475569" font-size="10">1. Kafka publish → 2. Wait for broker ACK → 3. Write checkpoint to PostgreSQL</text>
  <text x="450" y="473" text-anchor="middle" fill="#334155" font-size="10">If checkpoint were written before Kafka ACK: a crash between the two steps would advance the offset</text>
  <text x="450" y="489" text-anchor="middle" fill="#334155" font-size="10">without the TradeExecuted event being delivered → Settlement Service would never see the trade</text>
  <text x="450" y="506" text-anchor="middle" fill="#334155" font-size="10">Writing checkpoint AFTER ACK ensures at-least-once delivery with safe recovery</text>

  <!-- Recovery sentinel note -->
  <rect x="200" y="540" width="500" height="56" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="450" y="558" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">Recovery Sentinel</text>
  <text x="450" y="573" text-anchor="middle" fill="#334155" font-size="10">When recovery completes, Event Loop sends a sentinel MatchResult (fills=nil)</text>
  <text x="450" y="588" text-anchor="middle" fill="#334155" font-size="10">Publisher: no Kafka publish · only pushes depth snapshot to Redis to re-hydrate market data</text>

  <text x="450" y="620" text-anchor="middle" fill="#334155" font-size="10">Publisher never touches OrderBook memory · only consumes immutable MatchResults from Output Queue</text>
</svg>
