<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f97316"/></marker>
  </defs>
  <rect width="960" height="760" fill="url(#bg)"/>
  <rect width="960" height="760" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Order Lifecycle State Machine</text>
  <text x="480" y="55" text-anchor="middle" fill="#64748b" font-size="12">Order Service V5 · No PENDING / REJECTED states persisted · CANCELLING is durable</text>
  <line x1="80" y1="66" x2="880" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Initial dot -->
  <ellipse cx="480" cy="92" rx="12" ry="12" fill="#3b82f6"/>
  <line x1="480" y1="104" x2="480" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="120" fill="#475569" font-size="10">Validation + ReserveFunds success · INSERT</text>

  <!-- OPEN state -->
  <rect x="360" y="130" width="240" height="60" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="152" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">OPEN</text>
  <text x="480" y="170" text-anchor="middle" fill="#475569" font-size="10">Resting in matching engine</text>
  <text x="480" y="184" text-anchor="middle" fill="#334155" font-size="9">Funds reserved · OrderCreated published</text>

  <!-- OPEN → FULLY FILLED (direct, right) -->
  <line x1="600" y1="160" x2="760" y2="234" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="700" y="196" text-anchor="middle" fill="#22c55e" font-size="10">full match</text>
  <text x="700" y="209" text-anchor="middle" fill="#166534" font-size="9">TradeExecuted received</text>

  <!-- OPEN → PARTIALLY_FILLED -->
  <line x1="480" y1="190" x2="480" y2="238" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="495" y="217" fill="#f59e0b" font-size="10">partial match</text>
  <text x="495" y="229" fill="#78350f" font-size="9">TradeExecuted consumed</text>

  <!-- OPEN → CANCELLING (left) -->
  <line x1="360" y1="160" x2="190" y2="238" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="195" text-anchor="middle" fill="#a855f7" font-size="10">cancel requested</text>
  <text x="260" y="208" text-anchor="middle" fill="#6b21a8" font-size="9">DELETE /orders/{id} accepted</text>

  <!-- PARTIALLY_FILLED state -->
  <rect x="330" y="238" width="300" height="66" rx="10" fill="#1a1000" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="260" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">PARTIALLY_FILLED</text>
  <text x="480" y="278" text-anchor="middle" fill="#78350f" font-size="10">filled_qty &gt; 0 · remaining_qty &gt; 0</text>
  <text x="480" y="292" text-anchor="middle" fill="#78350f" font-size="9">Still resting on book for remaining quantity</text>
  <text x="480" y="304" text-anchor="middle" fill="#334155" font-size="8">CANCELLING → PARTIALLY_FILLED also valid (fill arrived before cancel)</text>

  <!-- PARTIALLY_FILLED → FILLED -->
  <line x1="630" y1="272" x2="760" y2="320" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="720" y="296" text-anchor="middle" fill="#22c55e" font-size="10">remaining matched</text>

  <!-- PARTIALLY_FILLED → CANCELLING -->
  <line x1="330" y1="272" x2="190" y2="340" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="308" text-anchor="middle" fill="#a855f7" font-size="10">cancel requested</text>

  <!-- FILLED state (right) -->
  <rect x="700" y="234" width="200" height="130" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="800" y="256" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">FILLED</text>
  <text x="800" y="274" text-anchor="middle" fill="#475569" font-size="10">Terminal state</text>
  <line x1="720" y1="282" x2="880" y2="282" stroke="#166534" stroke-width="0.5"/>
  <text x="800" y="297" text-anchor="middle" fill="#166534" font-size="9">filled_qty == original_qty</text>
  <text x="800" y="311" text-anchor="middle" fill="#166534" font-size="9">remaining_qty == 0</text>
  <text x="800" y="325" text-anchor="middle" fill="#166534" font-size="9">Settlement via TradeExecuted event</text>
  <text x="800" y="339" text-anchor="middle" fill="#166534" font-size="9">Reserved funds moved to settled</text>
  <text x="800" y="353" text-anchor="middle" fill="#334155" font-size="8">Also reached from CANCELLING if full fill</text>
  <!-- Terminal dot -->
  <ellipse cx="800" cy="360" rx="8" ry="8" fill="#22c55e"/>

  <!-- CANCELLING state (left) -->
  <rect x="60" y="238" width="220" height="130" rx="10" fill="#0e0a24" stroke="#a855f7" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" fill="#d8b4fe" font-size="14" font-weight="700">CANCELLING</text>
  <text x="170" y="278" text-anchor="middle" fill="#475569" font-size="10">Awaiting ME confirmation</text>
  <line x1="80" y1="286" x2="268" y2="286" stroke="#4c1d95" stroke-width="0.5"/>
  <text x="170" y="302" text-anchor="middle" fill="#6b21a8" font-size="9">Durable in DB across restarts</text>
  <text x="170" y="316" text-anchor="middle" fill="#6b21a8" font-size="9">OrderCancelRequested in Kafka</text>
  <text x="170" y="330" text-anchor="middle" fill="#6b21a8" font-size="9">Fill may still arrive (race condition)</text>
  <text x="170" y="344" text-anchor="middle" fill="#6b21a8" font-size="9">ME ignores cancel if fully filled</text>
  <text x="170" y="358" text-anchor="middle" fill="#334155" font-size="8">Filled portion stays settled even during cancel</text>

  <!-- CANCELLING → CANCELLED -->
  <line x1="170" y1="368" x2="170" y2="444" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="188" y="407" fill="#ef4444" font-size="10">ME confirms cancel</text>
  <text x="188" y="420" fill="#7f1d1d" font-size="9">OrderCancelled consumed</text>

  <!-- CANCELLING → PARTIALLY_FILLED (fill race) -->
  <line x1="280" y1="305" x2="330" y2="305" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="304" y="298" text-anchor="middle" fill="#f59e0b" font-size="9">fill race</text>

  <!-- CANCELLING → FILLED (full fill race) -->
  <line x1="280" y1="330" x2="700" y2="270" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
  <text x="490" y="305" text-anchor="middle" fill="#22c55e" font-size="9">fully filled before cancel (race)</text>

  <!-- CANCELLED state -->
  <rect x="60" y="444" width="220" height="100" rx="10" fill="#1a0000" stroke="#ef4444" stroke-width="2"/>
  <text x="170" y="466" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">CANCELLED</text>
  <text x="170" y="484" text-anchor="middle" fill="#475569" font-size="10">Terminal state</text>
  <line x1="80" y1="492" x2="268" y2="492" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="170" y="507" text-anchor="middle" fill="#7f1d1d" font-size="9">remaining_qty returned to available</text>
  <text x="170" y="521" text-anchor="middle" fill="#7f1d1d" font-size="9">ReleaseFunds(order_id) called</text>
  <text x="170" y="535" text-anchor="middle" fill="#7f1d1d" font-size="9">Only remaining_qty released, not full</text>
  <!-- Terminal dot -->
  <ellipse cx="170" cy="540" rx="8" ry="8" fill="#ef4444"/>

  <!-- Valid transitions table -->
  <rect x="340" y="400" width="580" height="250" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="630" y="420" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Valid Transitions</text>
  <!-- Headers -->
  <text x="380" y="440" fill="#64748b" font-size="10" font-weight="600">From</text>
  <text x="500" y="440" fill="#64748b" font-size="10" font-weight="600">To</text>
  <text x="660" y="440" fill="#64748b" font-size="10" font-weight="600">Trigger</text>
  <line x1="355" y1="445" x2="905" y2="445" stroke="#1e293b" stroke-width="0.5"/>
  <!-- Rows -->
  <text x="380" y="460" fill="#93c5fd" font-size="10">OPEN</text>
  <text x="500" y="460" fill="#fbbf24" font-size="10">PARTIALLY_FILLED</text>
  <text x="660" y="460" fill="#475569" font-size="10">Partial TradeExecuted consumed</text>

  <text x="380" y="476" fill="#93c5fd" font-size="10">OPEN</text>
  <text x="500" y="476" fill="#86efac" font-size="10">FILLED</text>
  <text x="660" y="476" fill="#475569" font-size="10">Full TradeExecuted consumed</text>

  <text x="380" y="492" fill="#93c5fd" font-size="10">OPEN</text>
  <text x="500" y="492" fill="#d8b4fe" font-size="10">CANCELLING</text>
  <text x="660" y="492" fill="#475569" font-size="10">DELETE /orders/{id} accepted</text>

  <text x="380" y="508" fill="#fbbf24" font-size="10">PARTIALLY_FILLED</text>
  <text x="500" y="508" fill="#86efac" font-size="10">FILLED</text>
  <text x="660" y="508" fill="#475569" font-size="10">Remaining quantity matched</text>

  <text x="380" y="524" fill="#fbbf24" font-size="10">PARTIALLY_FILLED</text>
  <text x="500" y="524" fill="#d8b4fe" font-size="10">CANCELLING</text>
  <text x="660" y="524" fill="#475569" font-size="10">Cancel requested for remainder</text>

  <text x="380" y="540" fill="#d8b4fe" font-size="10">CANCELLING</text>
  <text x="500" y="540" fill="#fca5a5" font-size="10">CANCELLED</text>
  <text x="660" y="540" fill="#475569" font-size="10">ME confirms: OrderCancelled consumed</text>

  <text x="380" y="556" fill="#d8b4fe" font-size="10">CANCELLING</text>
  <text x="500" y="556" fill="#fbbf24" font-size="10">PARTIALLY_FILLED</text>
  <text x="660" y="556" fill="#475569" font-size="10">Fill race: TradeExecuted arrived first</text>

  <text x="380" y="572" fill="#d8b4fe" font-size="10">CANCELLING</text>
  <text x="500" y="572" fill="#86efac" font-size="10">FILLED</text>
  <text x="660" y="572" fill="#475569" font-size="10">Fill race: fully filled before cancel</text>

  <text x="480" y="660" text-anchor="middle" fill="#334155" font-size="10">No PENDING or REJECTED state exists in DB · Failed validation/reservation = no row created · FILLED and CANCELLED are terminal</text>
  <text x="480" y="676" text-anchor="middle" fill="#334155" font-size="10">V1: LIMIT = GTC (rests until filled or cancelled) · MARKET = IOC (never rests; unfilled remainder → CANCELLED)</text>
</svg>
