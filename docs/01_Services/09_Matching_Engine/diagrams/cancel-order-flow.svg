<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1020" viewBox="0 0 980 1020">
  <defs>
    <!-- Drop Shadow Filter for Nodes -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <!-- Standard Marker/Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- TITLE -->
  <text x="490" y="30" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#0F172A" text-anchor="middle">Order Cancellation Flow</text>

  <!-- ==================== NODES ==================== -->

  <!-- A: Receive InputEvent (Start / Process) -->
  <g filter="url(#shadow)">
    <rect x="170" y="60" width="260" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="90" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Receive InputEvent: OrderCancelRequested</text>
  </g>

  <!-- B: Perform O(1) lookup: book.orderIndex (Process) -->
  <g filter="url(#shadow)">
    <rect x="150" y="145" width="300" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="175" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Perform O(1) lookup: book.orderIndex</text>
  </g>

  <!-- C: Found? (Decision) -->
  <g filter="url(#shadow)">
    <polygon points="300,230 380,265 300,300 220,265" fill="#EA580C"/>
    <text x="300" y="269" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Found?</text>
  </g>

  <!-- D: Return nil - idempotent no-op (End State / Success) -->
  <g filter="url(#shadow)">
    <rect x="20" y="240" width="160" height="50" rx="8" fill="#16A34A"/>
    <text x="100" y="265" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Idempotent No-Op</text>
    <text x="100" y="278" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="9" fill="#D1FAE5" text-anchor="middle">(Already filled or unknown)</text>
  </g>

  <!-- E: Identify Side & Subtract Quantity (Process) -->
  <g filter="url(#shadow)">
    <rect x="130" y="340" width="340" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="365" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Identify opposite Side &amp; Subtract</text>
    <text x="300" y="378" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">order remainingQty from PriceLevel totalQty</text>
  </g>

  <!-- F: Remove from list & delete from index (Process) -->
  <g filter="url(#shadow)">
    <rect x="130" y="425" width="340" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Remove element from PriceLevel linked list</text>
    <text x="300" y="463" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">&amp; delete order from book.orderIndex</text>
  </g>

  <!-- I: PriceLevel empty? (Decision) -->
  <g filter="url(#shadow)">
    <polygon points="300,510 390,550 300,590 210,550" fill="#EA580C"/>
    <text x="300" y="554" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">PriceLevel empty?</text>
  </g>

  <!-- J: Delete PriceLevel & Remove from sortedPrices (Process) -->
  <g filter="url(#shadow)">
    <rect x="60" y="620" width="220" height="55" rx="8" fill="#2563EB"/>
    <text x="170" y="643" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Delete PriceLevel map key &amp;</text>
    <text x="170" y="656" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">Remove price from sortedPrices list</text>
  </g>

  <!-- L: Return cancelled OrderNode (Process) -->
  <g filter="url(#shadow)">
    <rect x="200" y="715" width="200" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="745" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Return cancelled OrderNode</text>
  </g>

  <!-- M: Build cancelResult: user_requested (Process) -->
  <g filter="url(#shadow)">
    <rect x="180" y="800" width="240" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="825" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Build cancelResult:</text>
    <text x="300" y="838" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">reason = user_requested</text>
  </g>

  <!-- N: GetDepth snapshot (Process) -->
  <g filter="url(#shadow)">
    <rect x="210" y="885" width="180" height="50" rx="8" fill="#2563EB"/>
    <text x="300" y="915" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">GetDepth snapshot</text>
  </g>

  <!-- O: Send MatchResult to Output Queue (Success/End State) -->
  <g filter="url(#shadow)">
    <rect x="170" y="960" width="260" height="50" rx="8" fill="#16A34A"/>
    <text x="300" y="985" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Send MatchResult to Output Queue</text>
  </g>

  <!-- ==================== PATHS / ARROWS ==================== -->

  <!-- A -> B -->
  <path d="M 300 110 L 300 145" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- B -> C -->
  <path d="M 300 195 L 300 230" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- C -> D (No) -->
  <path d="M 220 265 L 180 265" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="257" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">No</text>

  <!-- C -> E (Yes) -->
  <path d="M 300 300 L 300 340" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="315" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">Yes</text>

  <!-- E -> F -->
  <path d="M 300 390 L 300 425" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- F -> I -->
  <path d="M 300 475 L 300 510" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- I -> J (Yes) -->
  <path d="M 210 550 L 170 550 L 170 620" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="150" y="542" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">Yes</text>

  <!-- I -> L (No) -->
  <path d="M 300 590 L 300 715" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="315" y="605" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">No</text>

  <!-- J -> L -->
  <path d="M 170 675 L 170 740 L 200 740" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- L -> M -->
  <path d="M 300 765 L 300 800" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- M -> N -->
  <path d="M 300 850 L 300 885" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- N -> O -->
  <path d="M 300 935 L 300 960" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

</svg>
