<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" width="920" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="920" height="680" fill="url(#bg)" rx="12"/>

  <text x="460" y="36" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="16" font-weight="bold">Market Service — Write &amp; Stats Sequence</text>
  <text x="460" y="54" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Matching Engine Match, Out-of-band Redis depth sync, Kafka trade consumption, and Ticker Cron loops</text>

  <!-- Participants -->
  <!-- Matching Engine -->
  <line x1="100" y1="100" x2="100" y2="620" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="84" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9" font-weight="bold">Matching Engine</text>

  <!-- Redis -->
  <line x1="280" y1="100" x2="280" y2="620" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="215" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="280" y="84" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">Redis Cache</text>

  <!-- Kafka -->
  <line x1="460" y1="100" x2="460" y2="620" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="395" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
  <text x="460" y="84" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">Kafka: TradeExecuted</text>

  <!-- Market Consumer -->
  <line x1="640" y1="100" x2="640" y2="620" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="565" y="65" width="150" height="30" rx="4" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="640" y="84" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9" font-weight="bold">Market Consumer</text>

  <!-- PostgreSQL -->
  <line x1="820" y1="100" x2="820" y2="620" stroke="#1e40af" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="755" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#1e40af" stroke-width="1.5"/>
  <text x="820" y="84" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold">PostgreSQL DB</text>

  <!-- Sequence steps -->
  <!-- 1. ME executes match → pushes book depth directly to Redis -->
  <line x1="100" y1="130" x2="280" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="190" y="123" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">1. write orderbook:{id} (L2 depth)</text>

  <!-- 2. ME publishes TradeExecuted -->
  <line x1="100" y1="170" x2="460" y2="170" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="280" y="163" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">2. publish TradeExecuted event</text>

  <!-- 3. Kafka delivers event to Market Consumer -->
  <line x1="460" y1="210" x2="640" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="203" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="8">3. deliver event message</text>

  <!-- 4. Consumer opens transaction & flushes buffer -->
  <line x1="640" y1="250" x2="820" y2="250" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="730" y="243" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="8">4. INSERT INTO market_trades (CTE ON CONFLICT DO NOTHING)</text>
 
  <!-- 5. Consumer calculates and updates 1m candles inside CTE -->
  <line x1="640" y1="290" x2="820" y2="290" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="730" y="283" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="8">5. Aggregate returned trades &amp; UPSERT 1m ohlc_candles</text>
 
  <!-- 6. DB transaction committed -->
  <line x1="820" y1="330" x2="640" y2="330" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="730" y="324" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">commit transaction</text>
 
  <!-- 7. Consumer ACKs Kafka offset -->
  <line x1="640" y1="360" x2="460" y2="360" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="353" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8">7. commit Kafka offset</text>
 
  <!-- 8. Background Ticker & Rollup Cron (Cron Role, replicas = 1) -->
  <rect x="580" y="400" width="280" height="150" rx="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="720" y="418" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9" font-weight="bold">Cron Role (10s ticker &amp; rollup loops)</text>
  
  <line x1="680" y1="440" x2="820" y2="440" stroke="#0ea5e9" stroke-width="1.2" marker-end="url(#arrBlue)"/>
  <text x="750" y="434" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">8.1 query 1m candles for 24h stats / perform rollups</text>

  <line x1="820" y1="475" x2="680" y2="475" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="750" y="469" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">returns aggregated stats</text>

  <line x1="680" y1="510" x2="280" y2="510" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arrRed)"/>
  <text x="480" y="504" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">8.2 update Redis ticker:{id} hash</text>

  <!-- Footer -->
  <text x="460" y="650" text-anchor="middle" fill="#334155" font-family="monospace" font-size="9">Order book depth updates do not write to PostgreSQL (zero disk lock overhead) · Price history is built strictly off the execution engine</text>
</svg>
