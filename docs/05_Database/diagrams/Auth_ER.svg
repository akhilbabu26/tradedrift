<svg xmlns="http://www.w3.org/2000/svg" width="700" height="450" viewBox="0 0 700 450">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#555555" />
    </marker>
    <marker id="one-to-many" viewBox="0 0 20 10" refX="18" refY="5" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <!-- Crow's foot representation for ER diagram -->
      <path d="M 0 5 L 18 5 M 10 0 L 18 5 L 10 10" fill="none" stroke="#555555" stroke-width="1.5" />
      <circle cx="6" cy="5" r="2" fill="white" stroke="#555555" stroke-width="1.5" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa" />  <!-- Table: users -->
  <rect x="50" y="50" width="240" height="256" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 50 56 A 6 6 0 0 1 56 50 L 284 50 A 6 6 0 0 1 290 56 L 290 80 L 50 80 Z" fill="#4e5d6c" />
  <text x="170" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">users</text>
  <text x="62" y="98" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="62" y="122" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  email : VARCHAR(255)</text>
  <text x="62" y="146" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  username : VARCHAR(64)</text>
  <text x="62" y="170" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  password_hash : VARCHAR(255)</text>
  <text x="62" y="194" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  status : VARCHAR(20)</text>
  <text x="62" y="218" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  failed_login_attempts : INT</text>
  <text x="62" y="242" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  locked_until : TIMESTAMPTZ</text>
  <text x="62" y="266" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  created_at : TIMESTAMPTZ</text>
  <text x="62" y="290" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  updated_at : TIMESTAMPTZ</text>
  <!-- Table: refresh_tokens -->
  <rect x="380" y="50" width="240" height="184" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 380 56 A 6 6 0 0 1 386 50 L 614 50 A 6 6 0 0 1 620 56 L 620 80 L 380 80 Z" fill="#4e5d6c" />
  <text x="500" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">refresh_tokens</text>
  <text x="392" y="98" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="392" y="122" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2980b9">- user_id : UUID [FK]</text>
  <text x="392" y="146" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  token_hash : VARCHAR(255)</text>
  <text x="392" y="170" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  status : VARCHAR(20)</text>
  <text x="392" y="194" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  expires_at : TIMESTAMPTZ</text>
  <text x="392" y="218" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  created_at : TIMESTAMPTZ</text>
  <!-- Table: blacklisted_tokens -->
  <rect x="380" y="270" width="240" height="112" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 380 276 A 6 6 0 0 1 386 270 L 614 270 A 6 6 0 0 1 620 276 L 620 300 L 380 300 Z" fill="#4e5d6c" />
  <text x="500" y="290" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">blacklisted_tokens</text>
  <text x="392" y="318" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ jti : UUID [PK]</text>
  <text x="392" y="342" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  user_id : UUID</text>
  <text x="392" y="366" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  expires_at : TIMESTAMPTZ</text>
  <line x1="290" y1="120" x2="370" y2="120" stroke="#555555" stroke-width="1.5" marker-end="url(#one-to-many)" />
</svg>
