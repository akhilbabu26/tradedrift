<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 700" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a855f7"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="860" height="700" fill="url(#bg)"/>
  <rect width="860" height="700" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Initialize Wallet Flow</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">Auth Service → InitializeWallet(user_id) · Per-asset idempotency · Seeds USDT balance</text>
  <line x1="80" y1="66" x2="780" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Trigger -->
  <rect x="270" y="82" width="320" height="46" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="430" y="102" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="600">gRPC: InitializeWallet(user_id)</text>
  <text x="430" y="119" text-anchor="middle" fill="#6b21a8" font-size="10">Called by Auth Service during user registration · synchronous</text>

  <line x1="430" y1="128" x2="430" y2="154" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Read supported_assets -->
  <rect x="270" y="154" width="320" height="44" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="430" y="174" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">① Read supported_assets table</text>
  <text x="430" y="191" text-anchor="middle" fill="#475569" font-size="10">Fetch all rows WHERE is_enabled = TRUE</text>

  <line x1="430" y1="198" x2="430" y2="224" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Per-asset loop -->
  <rect x="245" y="224" width="370" height="24" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="430" y="240" text-anchor="middle" fill="#64748b" font-size="10">FOR EACH asset in supported_assets (USDT, BTC, ETH, SOL ...)</text>

  <line x1="430" y1="248" x2="430" y2="274" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Check existing wallet -->
  <polygon points="430,274 590,300 430,326 270,300" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="297" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Wallet exists for</text>
  <text x="430" y="313" text-anchor="middle" fill="#78350f" font-size="10">(user_id, asset)?</text>

  <!-- Already exists → skip -->
  <line x1="590" y1="300" x2="700" y2="300" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="645" y="292" text-anchor="middle" fill="#f59e0b" font-size="10">YES — exists</text>
  <rect x="700" y="282" width="130" height="36" rx="7" fill="#1a1000" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="765" y="299" text-anchor="middle" fill="#fbbf24" font-size="11">Skip asset</text>
  <text x="765" y="313" text-anchor="middle" fill="#78350f" font-size="9">No-op · idempotent</text>

  <!-- New wallet → create -->
  <line x1="430" y1="326" x2="430" y2="356" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="444" y="344" fill="#22c55e" font-size="10">NO — create</text>

  <!-- Create wallet row -->
  <rect x="250" y="356" width="360" height="90" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="376" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">② Atomic DB Transaction</text>
  <line x1="270" y1="385" x2="590" y2="385" stroke="#166534" stroke-width="0.5"/>
  <rect x="268" y="390" width="160" height="46" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="348" y="408" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">INSERT wallets</text>
  <text x="348" y="422" text-anchor="middle" fill="#475569" font-size="9">available = seed_amount</text>
  <text x="348" y="435" text-anchor="middle" fill="#475569" font-size="9">reserved = 0</text>
  <!-- Conditional txn row if seed > 0 -->
  <rect x="440" y="390" width="155" height="46" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="517" y="408" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">INSERT txn</text>
  <text x="517" y="422" text-anchor="middle" fill="#475569" font-size="9">INITIAL_ALLOCATION CREDIT</text>
  <text x="517" y="435" text-anchor="middle" fill="#f59e0b" font-size="9">only if seed_amount &gt; 0</text>

  <line x1="430" y1="446" x2="430" y2="472" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="444" y="462" fill="#22c55e" font-size="10">COMMIT</text>

  <!-- Loop back for next asset -->
  <path d="M 620,430 Q 700,430 700,440 Q 720,440 720,248 Q 720,248 615,248" stroke="#64748b" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="740" y="350" text-anchor="middle" fill="#64748b" font-size="9" transform="rotate(90 740 350)">next asset</text>

  <!-- Return success -->
  <rect x="270" y="472" width="320" height="42" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.3"/>
  <text x="430" y="492" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">③ Return InitializeWalletResponse{success: true}</text>
  <text x="430" y="508" text-anchor="middle" fill="#334155" font-size="10">Whether new rows were created or all already existed</text>

  <!-- Key invariants -->
  <rect x="60" y="540" width="740" height="88" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.3"/>
  <text x="430" y="560" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Key Design Invariants</text>
  <text x="90" y="578" fill="#475569" font-size="10">① Idempotency is per (user_id, asset) — not per user — so new supported assets backfill correctly for existing users</text>
  <text x="90" y="594" fill="#475569" font-size="10">② INITIAL_ALLOCATION row has UNIQUE(reference_id=user_id, reference_type, asset) — prevents double-seeding at DB level</text>
  <text x="90" y="610" fill="#475569" font-size="10">③ Synchronous call (not event-driven) — avoids window where user exists but has no wallet yet</text>
  <text x="90" y="626" fill="#475569" font-size="10">④ Adding a new supported asset = data change only (INSERT into supported_assets) — no code redeploy required</text>

  <text x="430" y="672" text-anchor="middle" fill="#334155" font-size="10">V1 seed: USDT = 10,000 · BTC = 0 · ETH = 0 · SOL = 0 · No txn row written when seed_amount = 0</text>
</svg>
