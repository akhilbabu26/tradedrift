<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="860" height="640" fill="url(#bg)"/>
  <rect width="860" height="640" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Amend Order Flow</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">V1 Policy: Full amend = Cancel + New order (atomic)</text>
  <line x1="80" y1="66" x2="780" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Note: V1 has no PATCH /orders endpoint -->
  <rect x="80" y="82" width="700" height="52" rx="8" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="102" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">⚠  V1: No In-Place Amend Endpoint</text>
  <text x="430" y="120" text-anchor="middle" fill="#78350f" font-size="11">Order price / quantity cannot be changed in-place. Amendment is achieved by cancelling the existing order and placing a new one.</text>

  <line x1="430" y1="134" x2="430" y2="158" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: Client calls cancel -->
  <rect x="255" y="158" width="350" height="46" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="430" y="178" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">Step 1 — Cancel Existing Order</text>
  <text x="430" y="196" text-anchor="middle" fill="#475569" font-size="10">DELETE /orders/{original_id} · status → CANCELLING</text>

  <line x1="430" y1="204" x2="430" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Wait for cancellation confirmation -->
  <polygon points="430,228 590,255 430,282 270,255" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="251" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Await OrderCancelled</text>
  <text x="430" y="267" text-anchor="middle" fill="#78350f" font-size="9">Async · ME must confirm removal</text>

  <!-- Risk: fill before cancel -->
  <line x1="590" y1="255" x2="700" y2="255" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="645" y="246" text-anchor="middle" fill="#ef4444" font-size="10">Fill race</text>
  <rect x="700" y="235" width="140" height="42" rx="7" fill="#1a0000" stroke="#ef4444" stroke-width="1.3"/>
  <text x="770" y="254" text-anchor="middle" fill="#fca5a5" font-size="11">Order Filled</text>
  <text x="770" y="268" text-anchor="middle" fill="#7f1d1d" font-size="9">Amend aborted</text>

  <line x1="430" y1="282" x2="430" y2="308" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="444" y="298" fill="#22c55e" font-size="10">Cancelled ✓</text>

  <!-- Step 3: Place new order -->
  <rect x="255" y="308" width="350" height="50" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="328" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Step 2 — Place New Order</text>
  <text x="430" y="345" text-anchor="middle" fill="#475569" font-size="10">POST /orders with amended price / quantity</text>
  <text x="430" y="358" text-anchor="middle" fill="#334155" font-size="9">New UUIDv7 order_id generated · New fund reservation</text>

  <line x1="430" y1="358" x2="430" y2="384" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Warning: queue position -->
  <rect x="80" y="384" width="700" height="76" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.3"/>
  <text x="430" y="406" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Important Consequences of Cancel + Replace</text>
  <text x="430" y="424" text-anchor="middle" fill="#475569" font-size="10">① Price-time priority is LOST — new order joins the back of the queue at its price level</text>
  <text x="430" y="440" text-anchor="middle" fill="#475569" font-size="10">② New fund reservation required — a separate ReserveFunds call for the new quantity/price</text>
  <text x="430" y="455" text-anchor="middle" fill="#475569" font-size="10">③ New order_id — downstream systems (Portfolio, Notification) treat this as a brand-new order</text>

  <!-- Future plans -->
  <rect x="80" y="480" width="700" height="60" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="430" y="500" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">Future V2 — True In-Place Amend</text>
  <text x="430" y="518" text-anchor="middle" fill="#334155" font-size="10">PATCH /orders/{id} with delta quantity/price · Wallet adjustment in single transaction</text>
  <text x="430" y="534" text-anchor="middle" fill="#334155" font-size="10">Preserves queue position if price is unchanged · Requires PATCH handler + new outbox event type</text>

  <text x="430" y="584" text-anchor="middle" fill="#334155" font-size="10">V1 deliberately omits PATCH to avoid the queue-position and fund-adjustment complexity · Cancel + Replace is correct and safe</text>
</svg>
