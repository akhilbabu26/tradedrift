<svg xmlns="http://www.w3.org/2000/svg" width="700" height="560" viewBox="0 0 700 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#555555" />
    </marker>
    <marker id="one-to-many" viewBox="0 0 20 10" refX="18" refY="5" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <!-- Crow's foot representation for ER diagram -->
      <path d="M 0 5 L 18 5 M 10 0 L 18 5 L 10 10" fill="none" stroke="#555555" stroke-width="1.5" />
      <circle cx="6" cy="5" r="2" fill="white" stroke="#555555" stroke-width="1.5" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa" />  <!-- Table: supported_assets -->
  <rect x="50" y="50" width="240" height="184" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 50 56 A 6 6 0 0 1 56 50 L 284 50 A 6 6 0 0 1 290 56 L 290 80 L 50 80 Z" fill="#4e5d6c" />
  <text x="170" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">supported_assets</text>
  <text x="62" y="98" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ asset_code : VARCHAR(10) [PK]</text>
  <text x="62" y="122" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  asset_name : VARCHAR(50)</text>
  <text x="62" y="146" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  decimals : INT</text>
  <text x="62" y="170" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  is_enabled : BOOLEAN</text>
  <text x="62" y="194" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  seed_amount : DECIMAL(30,10)</text>
  <text x="62" y="218" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  display_order : INT</text>
  <!-- Table: wallets -->
  <rect x="380" y="50" width="240" height="208" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 380 56 A 6 6 0 0 1 386 50 L 614 50 A 6 6 0 0 1 620 56 L 620 80 L 380 80 Z" fill="#4e5d6c" />
  <text x="500" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">wallets</text>
  <text x="392" y="98" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="392" y="122" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  user_id : UUID</text>
  <text x="392" y="146" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2980b9">- asset : VARCHAR(10) [FK]</text>
  <text x="392" y="170" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  available_balance : DECIMAL(30,10)</text>
  <text x="392" y="194" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  reserved_balance : DECIMAL(30,10)</text>
  <text x="392" y="218" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  is_frozen : BOOLEAN</text>
  <text x="392" y="242" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  total_balance : DECIMAL(30,10)</text>
  <!-- Table: wallet_reservations -->
  <rect x="50" y="280" width="240" height="208" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 50 286 A 6 6 0 0 1 56 280 L 284 280 A 6 6 0 0 1 290 286 L 290 310 L 50 310 Z" fill="#4e5d6c" />
  <text x="170" y="300" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">wallet_reservations</text>
  <text x="62" y="328" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="62" y="352" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  order_id : UUID</text>
  <text x="62" y="376" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  user_id : UUID</text>
  <text x="62" y="400" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  asset : VARCHAR(10)</text>
  <text x="62" y="424" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  reserved_amount : DECIMAL(30,10)</text>
  <text x="62" y="448" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  consumed_amount : DECIMAL(30,10)</text>
  <text x="62" y="472" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  status : VARCHAR(20)</text>
  <!-- Table: wallet_transactions -->
  <rect x="380" y="280" width="240" height="208" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 380 286 A 6 6 0 0 1 386 280 L 614 280 A 6 6 0 0 1 620 286 L 620 310 L 380 310 Z" fill="#4e5d6c" />
  <text x="500" y="300" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">wallet_transactions</text>
  <text x="392" y="328" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="392" y="352" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2980b9">- wallet_id : UUID [FK]</text>
  <text x="392" y="376" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  reference_id : UUID</text>
  <text x="392" y="400" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  reference_type : VARCHAR(30)</text>
  <text x="392" y="424" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  transaction_type : VARCHAR(10)</text>
  <text x="392" y="448" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  asset : VARCHAR(10)</text>
  <text x="392" y="472" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  amount : DECIMAL(30,10)</text>
  <line x1="290" y1="100" x2="370" y2="100" stroke="#555555" stroke-width="1.5" marker-end="url(#one-to-many)" />
  <line x1="500" y1="240" x2="500" y2="270" stroke="#555555" stroke-width="1.5" marker-end="url(#one-to-many)" />
</svg>
