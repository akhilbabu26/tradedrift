<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 740" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
  </defs>
  <rect width="820" height="740" fill="url(#bg)"/>
  <rect width="820" height="740" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="410" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Market Order Flow (IOC)</text>
  <text x="410" y="55" text-anchor="middle" fill="#64748b" font-size="12">OrderCreated (MARKET) → IOC Match → Expire Remainder</text>
  <line x1="80" y1="66" x2="740" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- 1. Received -->
  <rect x="255" y="82" width="310" height="46" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="410" y="101" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">OrderCreated (MARKET) Received</text>
  <text x="410" y="119" text-anchor="middle" fill="#475569" font-size="10">No price field — crosses any available liquidity</text>

  <line x1="410" y1="128" x2="410" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Pre-match (no price check) -->
  <rect x="255" y="155" width="310" height="46" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="410" y="174" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Pre-Match: Lot Size Check Only</text>
  <text x="410" y="192" text-anchor="middle" fill="#475569" font-size="10">No tick size check — market orders carry no price</text>

  <line x1="410" y1="201" x2="410" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Opposite side has liquidity? -->
  <polygon points="410,228 570,260 410,292 250,260" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="257" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Opposite Side Has Liquidity?</text>
  <text x="410" y="275" text-anchor="middle" fill="#78350f" font-size="10">Any resting orders available?</text>

  <!-- No liquidity → immediate cancel -->
  <line x1="250" y1="260" x2="100" y2="260" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="175" y="250" text-anchor="middle" fill="#ef4444" font-size="10">NO LIQUIDITY</text>
  <rect x="20" y="330" width="160" height="55" rx="8" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
  <text x="100" y="351" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">OrderCancelled</text>
  <text x="100" y="367" text-anchor="middle" fill="#7f1d1d" font-size="10">reason: ioc_expired</text>
  <text x="100" y="382" text-anchor="middle" fill="#7f1d1d" font-size="10">remaining = full qty</text>
  <line x1="100" y1="260" x2="100" y2="330" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>

  <!-- Yes → match loop -->
  <line x1="410" y1="292" x2="410" y2="335" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="422" y="317" fill="#22c55e" font-size="10">HAS LIQUIDITY</text>

  <!-- Match loop -->
  <rect x="255" y="335" width="310" height="60" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="358" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">IOC Match Loop: ExecuteBest()</text>
  <text x="410" y="374" text-anchor="middle" fill="#475569" font-size="10">No price ceiling · consumes as much as available</text>
  <text x="410" y="390" text-anchor="middle" fill="#475569" font-size="10">fill qty = min(remaining, resting.qty)</text>

  <line x1="410" y1="395" x2="410" y2="427" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TradeExecuted -->
  <rect x="255" y="427" width="310" height="42" rx="8" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="410" y="447" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">TradeExecuted emitted</text>
  <text x="410" y="463" text-anchor="middle" fill="#78350f" font-size="10">trade_id · price (maker) · fill quantity</text>

  <line x1="410" y1="469" x2="410" y2="498" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- More liquidity? -->
  <polygon points="410,498 570,525 410,552 250,525" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="521" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">More liquidity &amp; remaining qty?</text>

  <!-- Yes loop back -->
  <line x1="570" y1="525" x2="660" y2="525" stroke="#f59e0b" stroke-width="1.3"/>
  <line x1="660" y1="525" x2="660" y2="365" stroke="#f59e0b" stroke-width="1.3"/>
  <line x1="660" y1="365" x2="565" y2="365" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrY)"/>
  <text x="680" y="448" text-anchor="middle" fill="#f59e0b" font-size="10" transform="rotate(-90 680 448)">MORE FILLS</text>

  <line x1="410" y1="552" x2="410" y2="600" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: full or partial? -->
  <polygon points="410,600 540,622 410,644 280,622" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="410" y="618" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">Remaining qty == 0?</text>
  <text x="410" y="634" text-anchor="middle" fill="#6b21a8" font-size="10">Fully filled?</text>

  <!-- Fully filled -->
  <line x1="540" y1="622" x2="640" y2="622" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrG)"/>
  <text x="590" y="614" text-anchor="middle" fill="#22c55e" font-size="10">YES</text>
  <rect x="640" y="598" width="140" height="48" rx="7" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.3"/>
  <text x="710" y="619" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Fully Filled</text>
  <text x="710" y="636" text-anchor="middle" fill="#166534" font-size="10">Done · no cancel event</text>

  <!-- Partial: expire remainder -->
  <line x1="410" y1="644" x2="410" y2="678" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="422" y="663" fill="#ef4444" font-size="10">PARTIAL</text>
  <rect x="280" y="678" width="260" height="52" rx="8" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
  <text x="410" y="698" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">OrderCancelled (IOC Expiry)</text>
  <text x="410" y="714" text-anchor="middle" fill="#7f1d1d" font-size="10">reason: ioc_expired</text>
  <text x="410" y="727" text-anchor="middle" fill="#7f1d1d" font-size="10">remaining_quantity = unfilled qty → Wallet.ReleaseFunds</text>

  <text x="410" y="760" text-anchor="middle" fill="#334155" font-size="10">Market orders are never inserted into the book · Unfilled remainder is always expired and released</text>
</svg>
