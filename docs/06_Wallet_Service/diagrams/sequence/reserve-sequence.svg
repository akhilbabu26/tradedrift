<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a855f7"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f97316"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="920" height="720" fill="url(#bg)"/>
  <rect width="920" height="720" fill="none" stroke="#1e293b" stroke-width="2"/>
  <text x="460" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Reserve Funds — Sequence Diagram</text>
  <text x="460" y="55" text-anchor="middle" fill="#64748b" font-size="12">Order Service → Wallet Service · Synchronous gRPC · Idempotent on order_id</text>
  <line x1="60" y1="66" x2="860" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Participants: OrderSvc=120, WalletSvc=380, Validator=570, Repository=740 -->
  <text x="120" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Order Service</text>
  <text x="340" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Wallet gRPC Layer</text>
  <text x="570" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Service Layer</text>
  <text x="760" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">PostgreSQL</text>

  <line x1="120" y1="100" x2="120" y2="680" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="340" y1="100" x2="340" y2="680" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="570" y1="100" x2="570" y2="680" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="760" y1="100" x2="760" y2="680" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <rect x="115" y="100" width="10" height="560" rx="2" fill="#1e3a5f"/>
  <rect x="335" y="116" width="10" height="50"  rx="2" fill="#1e3a5f"/>
  <rect x="565" y="148" width="10" height="360" rx="2" fill="#1e3a5f"/>
  <rect x="755" y="190" width="10" height="200" rx="2" fill="#1e3a5f"/>

  <!-- M1: gRPC call -->
  <line x1="130" y1="116" x2="330" y2="116" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="229" y="109" text-anchor="middle" fill="#a855f7" font-size="10">ReserveFunds(user_id, order_id, asset, amount)</text>

  <!-- M2: route to service layer -->
  <line x1="340" y1="148" x2="560" y2="148" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="449" y="141" text-anchor="middle" fill="#6b21a8" font-size="10">route + validate params</text>

  <!-- M3: idempotency check -->
  <rect x="565" y="158" width="175" height="20" rx="3" fill="#0f172a"/>
  <text x="652" y="172" text-anchor="middle" fill="#a855f7" font-size="9">§8.2 idempotency check</text>

  <!-- M4: SELECT reservation -->
  <line x1="575" y1="190" x2="750" y2="190" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="662" y="183" text-anchor="middle" fill="#60a5fa" font-size="10">SELECT FROM wallet_reservations WHERE order_id</text>

  <!-- M5: row response -->
  <line x1="755" y1="210" x2="580" y2="210" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <text x="667" y="204" text-anchor="middle" fill="#60a5fa" font-size="9">reservation row (or empty)</text>

  <!-- Already exists path -->
  <rect x="565" y="220" width="175" height="16" rx="3" fill="#1a1000"/>
  <text x="652" y="232" text-anchor="middle" fill="#f59e0b" font-size="9">If exists → return existing details (§8.2)</text>

  <!-- New path: balance check -->
  <line x1="575" y1="244" x2="750" y2="244" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="662" y="237" text-anchor="middle" fill="#60a5fa" font-size="10">SELECT wallets FOR UPDATE (balance check)</text>

  <line x1="755" y1="264" x2="580" y2="264" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <text x="667" y="258" text-anchor="middle" fill="#60a5fa" font-size="9">wallet row + lock</text>

  <!-- Insufficient check -->
  <rect x="565" y="272" width="175" height="16" rx="3" fill="#1a0000"/>
  <text x="652" y="284" text-anchor="middle" fill="#fca5a5" font-size="9">If insufficient → return error to Order Svc</text>

  <!-- BEGIN TX -->
  <rect x="565" y="296" width="175" height="16" rx="3" fill="#0c1a0c"/>
  <text x="652" y="308" text-anchor="middle" fill="#4ade80" font-size="9">BEGIN TRANSACTION</text>

  <!-- M: UPDATE wallets -->
  <line x1="575" y1="320" x2="750" y2="320" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="662" y="313" text-anchor="middle" fill="#22c55e" font-size="10">UPDATE wallets: available-=amt, reserved+=amt</text>

  <!-- M: INSERT reservation -->
  <line x1="575" y1="342" x2="750" y2="342" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="662" y="335" text-anchor="middle" fill="#22c55e" font-size="10">INSERT wallet_reservations (status=ACTIVE)</text>

  <!-- M: INSERT txn -->
  <line x1="575" y1="364" x2="750" y2="364" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="662" y="357" text-anchor="middle" fill="#22c55e" font-size="10">INSERT wallet_transactions (DEBIT, RESERVATION)</text>

  <!-- COMMIT -->
  <rect x="565" y="372" width="175" height="16" rx="3" fill="#0c1a0c"/>
  <text x="652" y="384" text-anchor="middle" fill="#4ade80" font-size="9">COMMIT</text>

  <!-- DB ACK -->
  <line x1="755" y1="392" x2="580" y2="392" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
  <text x="667" y="386" text-anchor="middle" fill="#166534" font-size="9">commit ✓</text>

  <!-- Return success -->
  <line x1="565" y1="410" x2="345" y2="410" stroke="#a855f7" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrP)"/>
  <text x="455" y="403" text-anchor="middle" fill="#a855f7" font-size="10">ReserveFundsResponse{success: true}</text>

  <line x1="335" y1="428" x2="130" y2="428" stroke="#a855f7" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrP)"/>
  <text x="232" y="421" text-anchor="middle" fill="#6b21a8" font-size="10">gRPC success · Order Svc proceeds to DB write</text>

  <!-- Legend -->
  <line x1="60" y1="540" x2="860" y2="540" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="560" text-anchor="middle" fill="#334155" font-size="10">Solid = synchronous request · Dashed = response · FOR UPDATE lock held only within the TX</text>
  <text x="460" y="576" text-anchor="middle" fill="#334155" font-size="10">§8.2: duplicate order_id call returns existing reservation details — never a constraint violation to caller</text>
  <text x="460" y="592" text-anchor="middle" fill="#334155" font-size="10">Order Service passes order_id (UUIDv7 pre-generated) as the idempotency key — Wallet never generates order IDs</text>
</svg>
