<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="860" height="580" fill="url(#bg)"/>
  <rect width="860" height="580" fill="none" stroke="#1e293b" stroke-width="2"/>
  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Settlement State Machine</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">settled_trades.status · Two states · Idempotent consumer pattern</text>
  <line x1="80" y1="66" x2="780" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Initial dot -->
  <ellipse cx="430" cy="92" rx="12" ry="12" fill="#f97316"/>
  <line x1="430" y1="104" x2="430" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="444" y="120" fill="#475569" font-size="10">TradeExecuted consumed · no existing row · Phase 1 INSERT</text>

  <!-- PENDING state -->
  <rect x="290" y="130" width="280" height="80" rx="10" fill="#0f1f38" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="154" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">PENDING</text>
  <text x="430" y="172" text-anchor="middle" fill="#475569" font-size="10">Trade registered · gRPC in progress</text>
  <text x="430" y="188" text-anchor="middle" fill="#78350f" font-size="10">Kafka offset NOT yet acknowledged</text>
  <text x="430" y="202" text-anchor="middle" fill="#334155" font-size="8">Short TX committed · DB conn released before any gRPC call</text>

  <!-- PENDING → SETTLED (success path) -->
  <line x1="430" y1="210" x2="430" y2="248" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="444" y="232" fill="#22c55e" font-size="10">Phase 3 commit (UPDATE status=SETTLED)</text>

  <!-- SETTLED state -->
  <rect x="280" y="248" width="300" height="90" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="272" text-anchor="middle" fill="#86efac" font-size="16" font-weight="700">SETTLED</text>
  <text x="430" y="290" text-anchor="middle" fill="#475569" font-size="10">Terminal state</text>
  <line x1="300" y1="298" x2="560" y2="298" stroke="#166534" stroke-width="0.5"/>
  <text x="430" y="312" text-anchor="middle" fill="#166534" font-size="9">settled_at set · Kafka offset ACK'd</text>
  <text x="430" y="326" text-anchor="middle" fill="#166534" font-size="9">Wallet balance shifts committed</text>
  <text x="430" y="338" text-anchor="middle" fill="#334155" font-size="8">Idempotency: re-delivered event → ACK no-op, no alerts raised</text>
  <ellipse cx="430" cy="340" rx="8" ry="8" fill="#22c55e"/>

  <!-- Self-loop: re-delivery while PENDING -->
  <path d="M 290,165 Q 210,165 210,180 Q 190,180 190,248 Q 190,280 290,280" stroke="#f59e0b" stroke-width="1.3" fill="none" stroke-dasharray="5,3" marker-end="url(#arrY)"/>
  <text x="170" y="216" text-anchor="middle" fill="#f59e0b" font-size="9">re-delivery</text>
  <text x="170" y="229" text-anchor="middle" fill="#78350f" font-size="8">while PENDING</text>
  <text x="170" y="242" text-anchor="middle" fill="#78350f" font-size="8">→ skip Phase 1</text>
  <text x="170" y="255" text-anchor="middle" fill="#78350f" font-size="8">retry Phase 2</text>

  <!-- Self-loop: re-delivery while SETTLED -->
  <path d="M 580,290 Q 660,290 660,310 Q 680,310 680,280 Q 680,255 580,248" stroke="#22c55e" stroke-width="1.3" fill="none" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="710" y="282" text-anchor="middle" fill="#22c55e" font-size="9">re-delivery</text>
  <text x="710" y="295" text-anchor="middle" fill="#166534" font-size="8">already SETTLED</text>
  <text x="710" y="308" text-anchor="middle" fill="#166534" font-size="8">→ ACK no-op</text>
  <text x="710" y="321" text-anchor="middle" fill="#166534" font-size="8">(SI-2)</text>

  <!-- Transitions table -->
  <rect x="60" y="390" width="740" height="148" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.3"/>
  <text x="430" y="410" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">State Transitions</text>
  <!-- Headers -->
  <text x="120" y="430" fill="#64748b" font-size="10" font-weight="600">From</text>
  <text x="240" y="430" fill="#64748b" font-size="10" font-weight="600">To</text>
  <text x="380" y="430" fill="#64748b" font-size="10" font-weight="600">Trigger</text>
  <text x="650" y="430" fill="#64748b" font-size="10" font-weight="600">Action</text>
  <line x1="80" y1="436" x2="780" y2="436" stroke="#334155" stroke-width="0.5"/>

  <text x="120" y="452" fill="#475569" font-size="10">— (no row)</text>
  <text x="240" y="452" fill="#fbbf24" font-size="10">PENDING</text>
  <text x="380" y="452" fill="#475569" font-size="10">Phase 1: new TradeExecuted, no existing row</text>
  <text x="650" y="452" fill="#475569" font-size="10">INSERT with status=PENDING</text>

  <text x="120" y="468" fill="#fbbf24" font-size="10">PENDING</text>
  <text x="240" y="468" fill="#86efac" font-size="10">SETTLED</text>
  <text x="380" y="468" fill="#475569" font-size="10">Phase 2 success → Phase 3 commit</text>
  <text x="650" y="468" fill="#475569" font-size="10">UPDATE status=SETTLED, settled_at=NOW()</text>

  <text x="120" y="484" fill="#fbbf24" font-size="10">PENDING</text>
  <text x="240" y="484" fill="#fbbf24" font-size="10">PENDING</text>
  <text x="380" y="484" fill="#475569" font-size="10">Re-delivery or recovery goroutine retry</text>
  <text x="650" y="484" fill="#475569" font-size="10">Skip Phase 1, retry Phase 2 directly</text>

  <text x="120" y="500" fill="#86efac" font-size="10">SETTLED</text>
  <text x="240" y="500" fill="#86efac" font-size="10">SETTLED</text>
  <text x="380" y="500" fill="#475569" font-size="10">Re-delivery of already-settled event</text>
  <text x="650" y="500" fill="#475569" font-size="10">ACK immediately · no DB write · no alert (SI-2)</text>

  <text x="430" y="556" text-anchor="middle" fill="#334155" font-size="10">No FAILED or ERROR state — failures leave PENDING row for recovery · DLQ for logical errors only (invalid payload)</text>
  <text x="430" y="572" text-anchor="middle" fill="#334155" font-size="10">trade_id from Matching Engine (UUIDv7, in-memory at match time) is the sole idempotency key — never regenerated</text>
</svg>
