<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" width="920" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="920" height="680" fill="url(#bg)" rx="12"/>

  <text x="460" y="36" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="16" font-weight="bold">Portfolio Service — Execution Sequence</text>
  <text x="460" y="54" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Consumption, local DB commit, and outbox publication lifecycle</text>

  <!-- Timelines -->
  <!-- Wallet/Kafka source -->
  <line x1="100" y1="100" x2="100" y2="620" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="84" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9" font-weight="bold">Kafka: TradeSettled</text>

  <!-- Portfolio Consumer -->
  <line x1="280" y1="100" x2="280" y2="620" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="205" y="65" width="150" height="30" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="280" y="84" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold">Portfolio Consumer</text>

  <!-- Local Postgres DB -->
  <line x1="480" y1="100" x2="480" y2="620" stroke="#1e40af" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="415" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#1e40af" stroke-width="1.5"/>
  <text x="480" y="84" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold">Local PostgreSQL</text>

  <!-- Outbox Goroutine -->
  <line x1="680" y1="100" x2="680" y2="620" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="615" y="65" width="130" height="30" rx="4" fill="#1e293b" stroke="#2563eb" stroke-width="1.5"/>
  <text x="680" y="84" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9" font-weight="bold">Outbox Publisher</text>

  <!-- Kafka: portfolio-updates -->
  <line x1="860" y1="100" x2="860" y2="620" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="785" y="65" width="140" height="30" rx="4" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
  <text x="855" y="84" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">Kafka: portfolio-updates</text>

  <!-- Interactions -->
  <!-- 1. Delivery -->
  <line x1="100" y1="130" x2="280" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="190" y="123" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="8">1. Consume TradeSettled message</text>

  <!-- 2. Process check -->
  <line x1="280" y1="160" x2="480" y2="160" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <text x="380" y="152" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="8">2. SELECT FROM processed_trades</text>

  <!-- DB response -->
  <line x1="480" y1="190" x2="280" y2="190" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="380" y="184" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">returns empty (new trade)</text>

  <!-- 3. Begin Transaction -->
  <rect x="270" y="210" width="220" height="150" rx="4" fill="#0f172a" stroke="#1e40af" stroke-width="1" opacity="0.9"/>
  <text x="380" y="224" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8" font-weight="bold">Atomic Transaction (Postgres)</text>
  <text x="280" y="244" fill="#94a3b8" font-family="monospace" font-size="7">3.1 LOCK buyer holding &amp; calculate qty/basis</text>
  <text x="280" y="260" fill="#94a3b8" font-family="monospace" font-size="7">3.2 LOCK seller holding &amp; calculate realized PnL</text>
  <text x="280" y="276" fill="#94a3b8" font-family="monospace" font-size="7">3.3 INSERT processed_trades (trade_id)</text>
  <text x="280" y="292" fill="#94a3b8" font-family="monospace" font-size="7">3.4 INSERT portfolio_outbox (event payload)</text>
  <text x="280" y="312" fill="#22c55e" font-family="monospace" font-size="8" font-weight="bold">3.5 COMMIT transaction</text>

  <!-- 4. ACK offset -->
  <line x1="280" y1="380" x2="100" y2="380" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="190" y="373" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8">4. ACK Kafka Offset</text>

  <!-- 5. Outbox polling -->
  <line x1="680" y1="410" x2="480" y2="410" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="580" y="402" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">5. Poll outbox (PENDING status)</text>

  <!-- DB returns row -->
  <line x1="480" y1="440" x2="680" y2="440" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="580" y="433" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">returns PENDING event</text>

  <!-- 6. Publish to Kafka -->
  <line x1="680" y1="470" x2="860" y2="470" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="770" y="462" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">6. Publish PortfolioUpdated</text>

  <!-- 7. Confirm publication -->
  <line x1="680" y1="500" x2="480" y2="500" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="580" y="492" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">7. UPDATE outbox SET status = PUBLISHED</text>

  <!-- 8. DB commit -->
  <line x1="480" y1="530" x2="680" y2="530" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="580" y="524" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">transaction committed</text>

  <!-- Footer -->
  <text x="460" y="650" text-anchor="middle" fill="#334155" font-family="monospace" font-size="9">If publisher crashes after step 6 but before step 7 → message redelivered → outbox poller retries and duplicate is sent (Notification handles user-level update overrides safely)</text>
</svg>
