<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a855f7"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
  </defs>
  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">User Account Suspension Flow (Saga)</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Administrative Trigger → Session Invalidation → Asynchronous Book &amp; Funds Cleanup</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Admin Console -->
  <rect x="50" y="90" width="160" height="40" rx="8" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="130" y="115" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Admin Console / API</text>

  <line x1="130" y1="130" x2="130" y2="166" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- User Service -->
  <rect x="50" y="166" width="160" height="84" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="130" y="190" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700">User Service</text>
  <line x1="60" y1="198" x2="200" y2="198" stroke="#334155" stroke-width="0.5"/>
  <text x="130" y="214" text-anchor="middle" fill="#cbd5e1" font-size="9">Set status = 'SUSPENDED'</text>
  <text x="130" y="226" text-anchor="middle" fill="#a855f7" font-size="8">Write Outbox: UserSuspended</text>

  <!-- Flow A: Session invalidate -->
  <line x1="210" y1="208" x2="310" y2="208" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="260" y="198" text-anchor="middle" fill="#d8b4fe" font-size="9">1. Invalidate (gRPC)</text>

  <!-- Auth Service -->
  <rect x="310" y="176" width="170" height="66" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="395" y="200" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">Authentication Service</text>
  <text x="395" y="218" text-anchor="middle" fill="#581c87" font-size="9">Blacklists refresh tokens</text>
  <text x="395" y="230" text-anchor="middle" fill="#581c87" font-size="8">Removes sessions from Redis</text>

  <!-- Flow B: Outbox to Kafka -->
  <line x1="130" y1="250" x2="130" y2="294" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="145" y="276" fill="#d8b4fe" font-size="9">2. Publish Event</text>

  <!-- Kafka Broker -->
  <rect x="50" y="294" width="430" height="40" rx="8" fill="#1b0c0c" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="265" y="318" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Kafka Topic: user-suspended (partitioned by user_id)</text>

  <line x1="265" y1="334" x2="265" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Order Service -->
  <rect x="150" y="370" width="230" height="80" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="265" y="394" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700">Order Service</text>
  <line x1="165" y1="402" x2="365" y2="402" stroke="#334155" stroke-width="0.5"/>
  <text x="265" y="416" text-anchor="middle" fill="#cbd5e1" font-size="9">Consumes UserSuspended event</text>
  <text x="265" y="428" text-anchor="middle" fill="#cbd5e1" font-size="9">Locates user's OPEN orders in DB</text>
  <text x="265" y="440" text-anchor="middle" fill="#a855f7" font-size="8">Write Outbox: OrderCancelRequested</text>

  <!-- Flow to Kafka Cancel Requested -->
  <path d="M 380,410 L 520,410 L 520,334" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="475" y="398" text-anchor="middle" fill="#d8b4fe" font-size="9">Publish Cancel</text>

  <!-- Matching Engine -->
  <rect x="520" y="370" width="200" height="80" rx="8" fill="#1b0c0c" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="620" y="394" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Matching Engine</text>
  <line x1="535" y1="402" x2="705" y2="402" stroke="#78350f" stroke-width="0.5"/>
  <text x="620" y="416" text-anchor="middle" fill="#f59e0b" font-size="9">Consumes OrderCancelRequested</text>
  <text x="620" y="428" text-anchor="middle" fill="#f59e0b" font-size="9">Removes orders from orderbooks</text>
  <text x="620" y="440" text-anchor="middle" fill="#22c55e" font-size="8">Publishes OrderCancelled</text>

  <!-- Flow ME to Order Service -->
  <path d="M 620,450 L 620,500 L 265,500 L 265,450" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="442" y="492" text-anchor="middle" fill="#22c55e" font-size="9">OrderCancelled Event (Kafka)</text>

  <!-- Wallet ReleaseFunds path -->
  <path d="M 200,450 L 200,540 L 520,540" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="362" y="532" text-anchor="middle" fill="#22c55e" font-size="9">ReleaseFunds (gRPC)</text>

  <!-- Wallet Service -->
  <rect x="520" y="510" width="200" height="66" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="620" y="534" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Wallet Service</text>
  <text x="620" y="552" text-anchor="middle" fill="#166534" font-size="9">Unlocks user's remaining reserved balance</text>
  <text x="620" y="564" text-anchor="middle" fill="#166534" font-size="8">Set reservation.status = RELEASED</text>

  <!-- Governance Status -->
  <rect x="50" y="594" width="800" height="36" rx="6" fill="#1c1917" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="616" text-anchor="middle" fill="#94a3b8" font-size="10">All cancellation steps execute transactionally. Re-delivery is safe via Order Service and Wallet Service idempotency keys.</text>
</svg>
