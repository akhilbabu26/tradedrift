<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f97316"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a855f7"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="860" height="860" fill="url(#bg)"/>
  <rect width="860" height="860" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Place Order Flow</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">POST /orders → Validate → Reserve → DB + Outbox → Kafka</text>
  <line x1="80" y1="66" x2="780" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- 1. Request arrives -->
  <rect x="255" y="82" width="350" height="46" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="101" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">POST /orders via API Gateway</text>
  <text x="430" y="119" text-anchor="middle" fill="#475569" font-size="10">Auth validated · rate-limit passed · routed to CreateOrder gRPC</text>

  <line x1="430" y1="128" x2="430" y2="154" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Generate UUIDv7 -->
  <rect x="255" y="154" width="350" height="46" rx="8" fill="#0e0a24" stroke="#a855f7" stroke-width="1.5"/>
  <text x="430" y="174" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="600">① Generate order_id  (UUIDv7)</text>
  <text x="430" y="192" text-anchor="middle" fill="#6b21a8" font-size="10">In application code · before any DB write or gRPC call</text>

  <line x1="430" y1="200" x2="430" y2="226" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Validate -->
  <rect x="255" y="226" width="350" height="50" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="430" y="246" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">② Validate Request</text>
  <text x="430" y="262" text-anchor="middle" fill="#475569" font-size="10">Trading pair exists · quantity &gt; 0 · LIMIT needs price</text>
  <text x="430" y="275" text-anchor="middle" fill="#334155" font-size="9">MARKET order must NOT include a price field</text>

  <!-- Validation fail branch -->
  <line x1="605" y1="250" x2="680" y2="250" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="641" y="242" text-anchor="middle" fill="#ef4444" font-size="10">FAIL</text>
  <rect x="680" y="232" width="150" height="36" rx="7" fill="#1a0000" stroke="#ef4444" stroke-width="1.3"/>
  <text x="755" y="250" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">400 Bad Request</text>
  <text x="755" y="264" text-anchor="middle" fill="#7f1d1d" font-size="9">No DB row created</text>

  <line x1="430" y1="276" x2="430" y2="302" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Reserve Funds -->
  <rect x="255" y="302" width="350" height="60" rx="8" fill="#0e0a24" stroke="#a855f7" stroke-width="2"/>
  <text x="430" y="323" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="600">③ ReserveFunds gRPC → Wallet Service</text>
  <text x="430" y="340" text-anchor="middle" fill="#6b21a8" font-size="10">ReserveFunds(user_id, order_id, asset, amount)</text>
  <text x="430" y="356" text-anchor="middle" fill="#4c1d95" font-size="9">LIMIT BUY: price × qty · MARKET BUY: entire available balance · SELL: base qty</text>

  <!-- Reserve fail branch -->
  <line x1="605" y1="330" x2="680" y2="330" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>
  <text x="641" y="322" text-anchor="middle" fill="#ef4444" font-size="10">DECLINE</text>
  <rect x="680" y="314" width="150" height="34" rx="7" fill="#1a0000" stroke="#ef4444" stroke-width="1.3"/>
  <text x="755" y="332" text-anchor="middle" fill="#fca5a5" font-size="11">Insufficient funds</text>
  <text x="755" y="346" text-anchor="middle" fill="#7f1d1d" font-size="9">No DB row created</text>

  <line x1="430" y1="362" x2="430" y2="390" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="444" y="378" fill="#22c55e" font-size="10">Reserved ✓</text>

  <!-- 5. DB Transaction -->
  <rect x="235" y="390" width="390" height="90" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="412" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">④ Atomic DB Transaction</text>
  <line x1="255" y1="420" x2="605" y2="420" stroke="#166534" stroke-width="0.5"/>
  <!-- orders insert -->
  <rect x="255" y="428" width="160" height="40" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="335" y="444" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">INSERT orders</text>
  <text x="335" y="458" text-anchor="middle" fill="#475569" font-size="9">id=order_id · status=OPEN</text>
  <!-- outbox insert -->
  <rect x="430" y="428" width="175" height="40" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="517" y="444" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">INSERT outbox</text>
  <text x="517" y="458" text-anchor="middle" fill="#475569" font-size="9">event_type=OrderCreated</text>

  <line x1="430" y1="480" x2="430" y2="508" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="444" y="497" fill="#22c55e" font-size="10">Commit ✓</text>

  <!-- 6. Return 202 -->
  <rect x="255" y="508" width="350" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.3"/>
  <text x="430" y="528" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">⑤ Return 202 Accepted to Client</text>
  <text x="430" y="545" text-anchor="middle" fill="#334155" font-size="10">order_id returned · order now in OPEN state</text>

  <line x1="430" y1="552" x2="430" y2="578" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- 7. Outbox Publisher polls -->
  <rect x="255" y="578" width="350" height="50" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1.5"/>
  <text x="430" y="599" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="600">⑥ Outbox Publisher polls (background)</text>
  <text x="430" y="616" text-anchor="middle" fill="#78350f" font-size="10">SELECT WHERE published_at IS NULL · publish to Kafka</text>
  <text x="430" y="629" text-anchor="middle" fill="#78350f" font-size="9">Mark row published_at only after Kafka ACK</text>

  <line x1="430" y1="628" x2="430" y2="656" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- 8. Kafka OrderCreated -->
  <rect x="255" y="656" width="350" height="46" rx="8" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="430" y="676" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">Kafka: OrderCreated published</text>
  <text x="430" y="694" text-anchor="middle" fill="#78350f" font-size="10">partition key = market_id → Matching Engine consumes</text>

  <!-- Crash recovery note -->
  <rect x="60" y="578" width="180" height="70" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="150" y="597" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Crash Safety</text>
  <text x="150" y="613" text-anchor="middle" fill="#334155" font-size="9">Row stays unpublished</text>
  <text x="150" y="626" text-anchor="middle" fill="#334155" font-size="9">if publisher crashes.</text>
  <text x="150" y="639" text-anchor="middle" fill="#334155" font-size="9">Next poll delivers it.</text>
  <text x="150" y="652" text-anchor="middle" fill="#334155" font-size="9">At-least-once guaranteed.</text>

  <text x="430" y="748" text-anchor="middle" fill="#334155" font-size="10">order_id exists before DB write · Wallet reservation is idempotent on order_id · No PENDING state ever persisted</text>
  <text x="430" y="764" text-anchor="middle" fill="#334155" font-size="10">202 is returned before Kafka publish — client must poll /orders/{id} to confirm Matching Engine acceptance</text>
</svg>
