<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 700" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="860" height="700" fill="url(#bg)"/>
  <rect width="860" height="700" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Order Service — Database Schema</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">PostgreSQL · orders + outbox tables · Outbox Pattern</text>
  <line x1="80" y1="66" x2="780" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- ORDERS TABLE -->
  <rect x="60" y="82" width="380" height="330" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <!-- Table header -->
  <rect x="60" y="82" width="380" height="38" rx="10" fill="#1e3a5f"/>
  <text x="250" y="101" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">orders</text>
  <text x="250" y="116" text-anchor="middle" fill="#475569" font-size="10">1 row per order · business state</text>

  <!-- Column rows -->
  <line x1="80" y1="120" x2="420" y2="120" stroke="#1e3a5f" stroke-width="0.5"/>
  <!-- Column header labels -->
  <text x="90"  y="136" fill="#64748b" font-size="9" font-weight="600">COLUMN</text>
  <text x="255" y="136" fill="#64748b" font-size="9" font-weight="600">TYPE</text>
  <text x="360" y="136" fill="#64748b" font-size="9" font-weight="600">NOTES</text>
  <line x1="80" y1="140" x2="420" y2="140" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- id -->
  <rect x="80" y="144" width="340" height="22" rx="3" fill="#0d2137"/>
  <text x="92"  y="159" fill="#f59e0b" font-size="10" font-weight="700">id</text>
  <text x="255" y="159" fill="#475569" font-size="9">UUID</text>
  <text x="360" y="159" fill="#22c55e" font-size="9">PK · UUIDv7 · app-generated</text>

  <!-- user_id -->
  <text x="92"  y="178" fill="#cbd5e1" font-size="10">user_id</text>
  <text x="255" y="178" fill="#475569" font-size="9">UUID NOT NULL</text>
  <text x="360" y="178" fill="#475569" font-size="9">FK → users</text>

  <!-- market_id -->
  <rect x="80" y="182" width="340" height="20" rx="3" fill="#0d2137"/>
  <text x="92"  y="196" fill="#cbd5e1" font-size="10">market_id</text>
  <text x="255" y="196" fill="#475569" font-size="9">VARCHAR(20) NOT NULL</text>
  <text x="360" y="196" fill="#f97316" font-size="9">Kafka partition key</text>

  <!-- side -->
  <text x="92"  y="215" fill="#cbd5e1" font-size="10">side</text>
  <text x="255" y="215" fill="#475569" font-size="9">VARCHAR(4) NOT NULL</text>
  <text x="360" y="215" fill="#475569" font-size="9">BUY | SELL</text>

  <!-- order_type -->
  <rect x="80" y="219" width="340" height="20" rx="3" fill="#0d2137"/>
  <text x="92"  y="233" fill="#cbd5e1" font-size="10">order_type</text>
  <text x="255" y="233" fill="#475569" font-size="9">VARCHAR(10) NOT NULL</text>
  <text x="360" y="233" fill="#475569" font-size="9">LIMIT | MARKET</text>

  <!-- price -->
  <text x="92"  y="252" fill="#cbd5e1" font-size="10">price</text>
  <text x="255" y="252" fill="#475569" font-size="9">DECIMAL(30,10)</text>
  <text x="360" y="252" fill="#f59e0b" font-size="9">NULL for MARKET orders</text>

  <!-- quantity -->
  <rect x="80" y="256" width="340" height="20" rx="3" fill="#0d2137"/>
  <text x="92"  y="270" fill="#cbd5e1" font-size="10">quantity</text>
  <text x="255" y="270" fill="#475569" font-size="9">DECIMAL(30,10) NOT NULL</text>
  <text x="360" y="270" fill="#475569" font-size="9">Original order qty</text>

  <!-- filled_quantity -->
  <text x="92"  y="289" fill="#cbd5e1" font-size="10">filled_quantity</text>
  <text x="255" y="289" fill="#475569" font-size="9">DECIMAL(30,10) NOT NULL</text>
  <text x="360" y="289" fill="#475569" font-size="9">DEFAULT 0</text>

  <!-- remaining_quantity -->
  <rect x="80" y="293" width="340" height="20" rx="3" fill="#0d2137"/>
  <text x="92"  y="307" fill="#cbd5e1" font-size="10">remaining_quantity</text>
  <text x="255" y="307" fill="#475569" font-size="9">DECIMAL(30,10) NOT NULL</text>
  <text x="360" y="307" fill="#475569" font-size="9">= qty - filled_qty</text>

  <!-- status -->
  <text x="92"  y="326" fill="#f59e0b" font-size="10" font-weight="600">status</text>
  <text x="255" y="326" fill="#475569" font-size="9">VARCHAR(20) NOT NULL</text>
  <text x="360" y="326" fill="#22c55e" font-size="9">State machine column</text>

  <!-- created_at -->
  <rect x="80" y="330" width="340" height="20" rx="3" fill="#0d2137"/>
  <text x="92"  y="344" fill="#cbd5e1" font-size="10">created_at</text>
  <text x="255" y="344" fill="#475569" font-size="9">TIMESTAMPTZ NOT NULL</text>
  <text x="360" y="344" fill="#475569" font-size="9">Set on INSERT</text>

  <!-- updated_at -->
  <text x="92"  y="363" fill="#cbd5e1" font-size="10">updated_at</text>
  <text x="255" y="363" fill="#475569" font-size="9">TIMESTAMPTZ NOT NULL</text>
  <text x="360" y="363" fill="#475569" font-size="9">Set on every UPDATE</text>

  <line x1="80" y1="370" x2="420" y2="370" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- Status enum note inside orders box -->
  <rect x="82" y="374" width="336" height="32" rx="5" fill="#0c1a0c"/>
  <text x="250" y="388" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">status values:</text>
  <text x="250" y="401" text-anchor="middle" fill="#475569" font-size="9">OPEN · PARTIALLY_FILLED · FILLED · CANCELLING · CANCELLED</text>

  <!-- OUTBOX TABLE -->
  <rect x="480" y="82" width="340" height="260" rx="10" fill="#1e1a00" stroke="#f97316" stroke-width="2"/>
  <!-- Table header -->
  <rect x="480" y="82" width="340" height="38" rx="10" fill="#3d2000"/>
  <text x="650" y="101" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">outbox</text>
  <text x="650" y="116" text-anchor="middle" fill="#78350f" font-size="10">1 row per event · published async</text>

  <line x1="500" y1="120" x2="800" y2="120" stroke="#3d2000" stroke-width="0.5"/>
  <text x="500" y="136" fill="#78350f" font-size="9" font-weight="600">COLUMN</text>
  <text x="650" y="136" fill="#78350f" font-size="9" font-weight="600">TYPE</text>
  <text x="750" y="136" fill="#78350f" font-size="9" font-weight="600">NOTES</text>
  <line x1="500" y1="140" x2="800" y2="140" stroke="#3d2000" stroke-width="0.5"/>

  <rect x="500" y="144" width="300" height="22" rx="3" fill="#2d1800"/>
  <text x="510" y="159" fill="#f59e0b" font-size="10" font-weight="700">id</text>
  <text x="650" y="159" fill="#78350f" font-size="9">UUID</text>
  <text x="750" y="159" fill="#22c55e" font-size="9">PK</text>

  <text x="510" y="178" fill="#fdba74" font-size="10">aggregate_id</text>
  <text x="650" y="178" fill="#78350f" font-size="9">UUID</text>
  <text x="750" y="178" fill="#78350f" font-size="9">= order_id</text>

  <rect x="500" y="182" width="300" height="20" rx="3" fill="#2d1800"/>
  <text x="510" y="196" fill="#fdba74" font-size="10">event_type</text>
  <text x="650" y="196" fill="#78350f" font-size="9">TEXT NOT NULL</text>
  <text x="750" y="196" fill="#78350f" font-size="9">OrderCreated etc.</text>

  <text x="510" y="215" fill="#fdba74" font-size="10">payload</text>
  <text x="650" y="215" fill="#78350f" font-size="9">JSONB NOT NULL</text>
  <text x="750" y="215" fill="#78350f" font-size="9">Full event body</text>

  <rect x="500" y="219" width="300" height="20" rx="3" fill="#2d1800"/>
  <text x="510" y="233" fill="#fdba74" font-size="10">partition_key</text>
  <text x="650" y="233" fill="#78350f" font-size="9">TEXT NOT NULL</text>
  <text x="750" y="233" fill="#f97316" font-size="9">= market_id</text>

  <text x="510" y="252" fill="#fdba74" font-size="10">published_at</text>
  <text x="650" y="252" fill="#78350f" font-size="9">TIMESTAMPTZ</text>
  <text x="750" y="252" fill="#22c55e" font-size="9">NULL = unpublished</text>

  <rect x="500" y="256" width="300" height="20" rx="3" fill="#2d1800"/>
  <text x="510" y="270" fill="#fdba74" font-size="10">created_at</text>
  <text x="650" y="270" fill="#78350f" font-size="9">TIMESTAMPTZ NOT NULL</text>
  <text x="750" y="270" fill="#78350f" font-size="9">Set on INSERT</text>

  <line x1="500" y1="276" x2="800" y2="276" stroke="#3d2000" stroke-width="0.5"/>
  <rect x="502" y="280" width="296" height="56" rx="5" fill="#1a1000"/>
  <text x="650" y="296" text-anchor="middle" fill="#f97316" font-size="9" font-weight="600">Publisher reads: WHERE published_at IS NULL</text>
  <text x="650" y="310" text-anchor="middle" fill="#78350f" font-size="9">ORDER BY created_at ASC · poll every 100–250ms</text>
  <text x="650" y="324" text-anchor="middle" fill="#78350f" font-size="9">SET published_at = now() only after Kafka ACK</text>

  <!-- Relationship line: orders ↔ outbox -->
  <line x1="440" y1="200" x2="480" y2="200" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="461" y="193" text-anchor="middle" fill="#64748b" font-size="9">1 : N</text>

  <!-- Indexes section -->
  <rect x="60" y="430" width="760" height="110" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.3"/>
  <text x="430" y="450" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Recommended Indexes</text>
  <line x1="80" y1="456" x2="800" y2="456" stroke="#1e293b" stroke-width="0.5"/>

  <text x="100" y="472" fill="#64748b" font-size="10" font-weight="600">Table</text>
  <text x="200" y="472" fill="#64748b" font-size="10" font-weight="600">Index</text>
  <text x="550" y="472" fill="#64748b" font-size="10" font-weight="600">Purpose</text>

  <text x="100" y="490" fill="#93c5fd" font-size="10">orders</text>
  <text x="200" y="490" fill="#475569" font-size="10">idx_orders_user_id</text>
  <text x="550" y="490" fill="#475569" font-size="10">ListOrders by user</text>

  <text x="100" y="506" fill="#93c5fd" font-size="10">orders</text>
  <text x="200" y="506" fill="#475569" font-size="10">idx_orders_market_status  (market_id, status)</text>
  <text x="550" y="506" fill="#475569" font-size="10">List open orders per market</text>

  <text x="100" y="522" fill="#fb923c" font-size="10">outbox</text>
  <text x="200" y="522" fill="#475569" font-size="10">idx_outbox_unpublished  (published_at, created_at)</text>
  <text x="550" y="522" fill="#475569" font-size="10">Outbox publisher poll (partial index WHERE published_at IS NULL)</text>

  <!-- Constraint note -->
  <rect x="60" y="560" width="760" height="80" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="430" y="580" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Key Design Decisions</text>
  <text x="100" y="598" fill="#475569" font-size="10">① orders.id is UUID (not BIGSERIAL) — order_id must exist before DB write to be passed to ReserveFunds gRPC</text>
  <text x="100" y="614" fill="#475569" font-size="10">② outbox written in the same transaction as orders — guarantees event is never lost even if publisher crashes</text>
  <text x="100" y="630" fill="#475569" font-size="10">③ published_at = NULL is the polling predicate — no separate status column needed for the outbox</text>

  <text x="430" y="682" text-anchor="middle" fill="#334155" font-size="10">No PENDING or REJECTED rows ever written · Failed validation rejects before INSERT · V1: zero fees, no fee columns</text>
</svg>
