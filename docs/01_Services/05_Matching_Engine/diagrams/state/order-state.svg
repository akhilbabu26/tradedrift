<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/></marker>
  </defs>
  <rect width="900" height="780" fill="url(#bg)"/>
  <rect width="900" height="780" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Order State — Matching Engine View</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">In-memory lifecycle from event dequeue to removal</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- INCOMING state -->
  <ellipse cx="450" cy="92" rx="12" ry="12" fill="#3b82f6"/>
  <line x1="450" y1="104" x2="450" y2="124" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="320" y="124" width="260" height="50" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">INCOMING</text>
  <text x="450" y="165" text-anchor="middle" fill="#475569" font-size="10">Event dequeued · ValidateParameters</text>

  <!-- Validation fail branch LEFT -->
  <line x1="320" y1="149" x2="170" y2="220" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="230" y="192" text-anchor="middle" fill="#ef4444" font-size="10">Validation FAIL</text>

  <!-- Validation pass → MATCHING -->
  <line x1="450" y1="174" x2="450" y2="220" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="462" y="200" fill="#22c55e" font-size="10">Pass</text>

  <rect x="310" y="220" width="280" height="55" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="242" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">MATCHING</text>
  <text x="450" y="260" text-anchor="middle" fill="#475569" font-size="10">CheckOppositeSide · Run Match Loop</text>
  <text x="450" y="274" text-anchor="middle" fill="#334155" font-size="9">(LIMIT: has price constraint · MARKET: any price)</text>

  <!-- Three outcomes from MATCHING -->

  <!-- 1. Fully filled -->
  <line x1="590" y1="248" x2="720" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="668" y="268" text-anchor="middle" fill="#22c55e" font-size="10">fully filled</text>

  <!-- 2. Partial → INSERT_FLOW -->
  <line x1="450" y1="275" x2="450" y2="325" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="462" y="303" fill="#f59e0b" font-size="10">LIMIT partial</text>

  <!-- 3. Market partial → IOC_CANCEL -->
  <line x1="310" y1="248" x2="140" y2="310" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="215" y="280" text-anchor="middle" fill="#ef4444" font-size="10">MARKET remainder</text>

  <!-- INSERT_FLOW -->
  <rect x="310" y="325" width="280" height="55" rx="10" fill="#0f1f38" stroke="#a855f7" stroke-width="2"/>
  <text x="450" y="347" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">INSERT_FLOW</text>
  <text x="450" y="364" text-anchor="middle" fill="#475569" font-size="10">AddToPriceLevel · IndexInOrderIndex</text>
  <text x="450" y="379" text-anchor="middle" fill="#334155" font-size="9">Price-time priority preserved</text>

  <line x1="450" y1="380" x2="450" y2="418" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- RESTING -->
  <rect x="310" y="418" width="280" height="55" rx="10" fill="#0f1f38" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="440" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">RESTING</text>
  <text x="450" y="458" text-anchor="middle" fill="#475569" font-size="10">Awaiting opposite side · Queue position held</text>
  <text x="450" y="473" text-anchor="middle" fill="#334155" font-size="9">Can be: partially filled · fully consumed · cancelled</text>

  <!-- From RESTING: three exits -->
  <!-- Partial fill in place -->
  <line x1="590" y1="445" x2="760" y2="445" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="675" y="437" text-anchor="middle" fill="#f59e0b" font-size="10">partial fill</text>

  <!-- Fully consumed -->
  <line x1="590" y1="465" x2="720" y2="530" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="680" y="500" text-anchor="middle" fill="#22c55e" font-size="10">fully consumed</text>

  <!-- Cancel while resting -->
  <line x1="310" y1="445" x2="140" y2="445" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="225" y="437" text-anchor="middle" fill="#ef4444" font-size="10">OrderCancelRequested</text>

  <!-- PARTIALLY_FILLED (right side) -->
  <rect x="700" y="418" width="180" height="55" rx="10" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="790" y="440" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">PARTIALLY_FILLED</text>
  <text x="790" y="457" text-anchor="middle" fill="#78350f" font-size="10">remainingQty reduced</text>
  <text x="790" y="472" text-anchor="middle" fill="#78350f" font-size="9">Queue position kept</text>
  <!-- PARTIALLY_FILLED → FULLY_FILLED or CANCEL -->
  <line x1="790" y1="473" x2="790" y2="550" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrY)"/>
  <text x="802" y="515" fill="#f59e0b" font-size="9">consumed</text>

  <!-- IOC_CANCEL_FLOW (left side) -->
  <rect x="20" y="295" width="185" height="55" rx="10" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
  <text x="112" y="317" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">IOC_CANCEL_FLOW</text>
  <text x="112" y="334" text-anchor="middle" fill="#7f1d1d" font-size="10">DiscardRemainder</text>
  <text x="112" y="349" text-anchor="middle" fill="#7f1d1d" font-size="9">reason: ioc_expired</text>
  <line x1="112" y1="350" x2="112" y2="456" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrR)"/>

  <!-- CANCELLED (left terminal) -->
  <rect x="20" y="456" width="185" height="50" rx="10" fill="#1a0000" stroke="#ef4444" stroke-width="2"/>
  <text x="112" y="476" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">CANCELLED</text>
  <text x="112" y="492" text-anchor="middle" fill="#7f1d1d" font-size="10">Released / Discarded</text>
  <text x="112" y="505" text-anchor="middle" fill="#7f1d1d" font-size="9">OrderCancelled emitted</text>

  <!-- FULLY_FILLED (right / bottom terminal) -->
  <rect x="640" y="530" width="220" height="50" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="750" y="550" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">FULLY_FILLED</text>
  <text x="750" y="567" text-anchor="middle" fill="#166534" font-size="10">Removed from book + OrderIndex</text>
  <text x="750" y="580" text-anchor="middle" fill="#166534" font-size="9">TradeExecuted(s) already emitted</text>

  <!-- CANCELLED (from RESTING cancel) also: same box -->
  <!-- arrow from resting left → CANCELLED box -->

  <!-- Invalid → CANCELLED arrow from INCOMING -->
  <!-- (already drawn above to CANCELLED area) -->
  <rect x="20" y="220" width="185" height="50" rx="10" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
  <text x="112" y="240" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">CANCELLED</text>
  <text x="112" y="257" text-anchor="middle" fill="#7f1d1d" font-size="10">invalid_order_parameters</text>
  <text x="112" y="270" text-anchor="middle" fill="#7f1d1d" font-size="9">OrderCancelled emitted</text>

  <!-- Terminal dots -->
  <ellipse cx="112" cy="507" rx="9" ry="9" fill="#ef4444"/>
  <ellipse cx="750" cy="582" rx="9" ry="9" fill="#22c55e"/>
  <ellipse cx="112" cy="272" rx="9" ry="9" fill="#ef4444"/>

  <text x="450" y="650" text-anchor="middle" fill="#334155" font-size="10">Matching Engine view only · Full order lifecycle (OPEN → FILLED) tracked by Order Service</text>
  <text x="450" y="666" text-anchor="middle" fill="#334155" font-size="10">In-memory only · No database reads during matching hot path</text>
</svg>
