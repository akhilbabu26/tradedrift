<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" width="720" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="720" height="620" fill="url(#bg)" rx="12"/>

  <text x="360" y="36" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="16" font-weight="bold">Trade Service — Consume TradeSettled Flow</text>
  <text x="360" y="54" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Kafka consumer · one goroutine per partition · no network call on write path</text>

  <!-- Step 1: Receive -->
  <rect x="210" y="80" width="300" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="101" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">1. Receive TradeSettled from Kafka</text>
  <text x="360" y="119" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="9">partition key: market_id · at-least-once delivery</text>

  <line x1="360" y1="132" x2="360" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Validate -->
  <rect x="210" y="160" width="300" height="62" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="182" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold">2. Validate Payload</text>
  <text x="360" y="198" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">all required fields present</text>
  <text x="360" y="213" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">UUIDs valid · amounts &gt; 0</text>

  <!-- Invalid branch -->
  <line x1="510" y1="191" x2="590" y2="191" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="550" y="185" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8">invalid</text>
  <rect x="590" y="165" width="115" height="52" rx="6" fill="#1e293b" stroke="#7f1d1d" stroke-width="1.2"/>
  <text x="647" y="185" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9" font-weight="bold">→ DLQ</text>
  <text x="647" y="200" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">ACK offset</text>
  <text x="647" y="212" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">log error</text>

  <line x1="360" y1="222" x2="360" y2="258" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="244" fill="#22c55e" font-family="monospace" font-size="8">valid</text>

  <!-- Step 3: INSERT -->
  <rect x="175" y="258" width="370" height="80" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="360" y="280" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold">3. INSERT INTO trades</text>
  <text x="360" y="297" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">INSERT INTO trades (id, buyer_id, seller_id, buy_order_id, sell_order_id,</text>
  <text x="360" y="312" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">  market_id, base_asset, quote_asset, price, quantity, executed_at, settled_at)</text>
  <text x="360" y="327" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9" font-weight="bold">ON CONFLICT (id) DO NOTHING</text>

  <!-- DB branch: conflict -->
  <line x1="545" y1="298" x2="600" y2="298" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="572" y="292" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">duplicate</text>
  <rect x="600" y="278" width="105" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="652" y="295" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">no-op</text>
  <text x="652" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">safe</text>

  <line x1="360" y1="338" x2="360" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DB fail branch -->
  <line x1="175" y1="298" x2="120" y2="298" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="148" y="292" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8">DB fail</text>
  <rect x="15" y="278" width="105" height="40" rx="6" fill="#1e293b" stroke="#7f1d1d" stroke-width="1"/>
  <text x="67" y="294" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9">do NOT ACK</text>
  <text x="67" y="308" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">backoff retry</text>

  <!-- Step 4: ACK -->
  <rect x="210" y="372" width="300" height="52" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="393" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">4. ACK Kafka Offset</text>
  <text x="360" y="410" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">consumer commits offset to broker</text>

  <line x1="360" y1="424" x2="360" y2="458" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Done -->
  <rect x="260" y="458" width="200" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="360" y="473" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">✓ Done</text>
  <text x="360" y="489" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="9">trade row persisted</text>

  <!-- Key notes -->
  <rect x="30" y="530" width="660" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="360" y="550" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9" font-weight="bold">Key properties</text>
  <text x="360" y="567" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">No recovery goroutine needed — entire path is: parse → single DB INSERT → ACK (no gRPC call)</text>
  <text x="360" y="582" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Crash between INSERT and ACK → Kafka redelivers → ON CONFLICT absorbs duplicate safely</text>
</svg>
