<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0f172a"/>
  
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.75"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold">TradeDrift — Notification Service Component Overview</text>
  <text x="30" y="52" fill="#64748b" font-family="monospace" font-size="9">Distributed WebSocket Streaming &amp; Persistent Notification Inbox Layout</text>

  <!-- External Clients -->
  <rect x="50" y="100" width="160" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-dasharray="4,4" stroke-width="1"/>
  <text x="130" y="125" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">Clients (Browsers/Apps)</text>
  
  <rect x="70" y="150" width="120" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="130" y="174" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="9">Client UI (User A)</text>

  <rect x="70" y="210" width="120" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="130" y="234" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="9">Client UI (User B)</text>

  <rect x="70" y="270" width="120" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="130" y="294" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="9">Client UI (User C)</text>

  <text x="130" y="360" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">TCP / HTTP Upgrades</text>

  <!-- WebSocket / API Role Replicas -->
  <rect x="290" y="100" width="220" height="340" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="400" y="125" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold">notification-service-api</text>
  <text x="400" y="138" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Role: API / WS Gateway (Replicas: N)</text>

  <!-- API Replica 1 -->
  <rect x="310" y="160" width="180" height="60" rx="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="1"/>
  <text x="400" y="180" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="9" font-weight="bold">API Replica Pod 1</text>
  <text x="400" y="195" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="8">Holds WS User A, B</text>
  <text x="400" y="208" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="7">Subscribed to Redis user:A, user:B</text>

  <!-- API Replica 2 -->
  <rect x="310" y="250" width="180" height="60" rx="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="1"/>
  <text x="400" y="270" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="9" font-weight="bold">API Replica Pod 2</text>
  <text x="400" y="285" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="8">Holds WS User C</text>
  <text x="400" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="7">Subscribed to Redis user:C</text>

  <!-- API Replica 3 (REST/gRPC only) -->
  <rect x="310" y="340" width="180" height="60" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9" font-weight="bold">API Replica Pod 3</text>
  <text x="400" y="380" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Handles REST / gRPC Queries</text>

  <!-- Redis Pub/Sub Backplane -->
  <rect x="580" y="220" width="230" height="90" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="695" y="242" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="10" font-weight="bold">Redis Cache &amp; Pub/Sub</text>
  <text x="695" y="256" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Cross-Pod Message Router</text>
  <text x="600" y="280" fill="#cbd5e1" font-family="monospace" font-size="8">Channel user:{id} -&gt; Event Payload</text>
  <text x="600" y="295" fill="#cbd5e1" font-family="monospace" font-size="8">Channel market:trades:{id} -&gt; Trades</text>

  <!-- PostgreSQL Database -->
  <rect x="580" y="340" width="230" height="80" rx="8" fill="#1e293b" stroke="#1e40af" stroke-width="1.5"/>
  <text x="695" y="362" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">PostgreSQL Database</text>
  <text x="695" y="375" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Service Database Schema</text>
  <text x="600" y="398" fill="#cbd5e1" font-family="monospace" font-size="8">Tables: notifications, outbox</text>

  <!-- Worker & Cron Roles -->
  <rect x="290" y="460" width="220" height="45" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="478" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">notification-service-worker</text>
  <text x="400" y="490" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Role: Ingestion &amp; Outbox (Replicas: N)</text>

  <rect x="580" y="460" width="230" height="45" rx="6" fill="#1e293b" stroke="#eab308" stroke-dasharray="3,2" stroke-width="1"/>
  <text x="695" y="478" text-anchor="middle" fill="#facc15" font-family="monospace" font-size="10" font-weight="bold">notification-service-cron</text>
  <text x="695" y="490" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Role: Cleanups &amp; Archive (Replicas: 1)</text>

  <!-- Connections -->
  <!-- WS Clients to API pods -->
  <path d="M 190 170 Q 250 170 310 180" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <path d="M 190 230 Q 250 210 310 195" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <path d="M 190 290 Q 250 280 310 280" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- API Replicas to Redis Pub/Sub -->
  <path d="M 490 190 Q 580 200 630 220" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" marker-start="url(#arr)"/>
  <path d="M 490 280 L 580 270" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" marker-start="url(#arr)"/>

  <!-- Worker to Redis Pub/Sub & Postgres -->
  <path d="M 400 460 L 400 435" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M 510 480 Q 560 480 580 430" fill="none" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrGreen)"/>
  <text x="565" y="465" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="7">1. Write Notification</text>

  <path d="M 510 482 Q 620 482 660 310" fill="none" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="585" y="495" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="7">2. Publish event</text>

  <!-- Legend / Info -->
  <text x="695" y="130" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="9" font-weight="bold">Shared PostgreSQL &amp; Redis Cache</text>
  <text x="695" y="145" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">All roles access the same database</text>
  <text x="695" y="157" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">and Redis cluster instances.</text>
</svg>
