<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f97316"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="960" height="680" fill="url(#bg)"/>
  <rect width="960" height="680" fill="none" stroke="#1e293b" stroke-width="2"/>
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Settlement Service — Component Overview</text>
  <text x="480" y="55" text-anchor="middle" fill="#64748b" font-size="12">V1.1 · Bridge between Matching Engine and Wallet Service · No Kafka publishing</text>
  <line x1="60" y1="66" x2="900" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Matching Engine (upstream) -->
  <rect x="40" y="82" width="180" height="50" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="102" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Matching Engine</text>
  <text x="130" y="119" text-anchor="middle" fill="#475569" font-size="10">publishes TradeExecuted</text>

  <line x1="220" y1="107" x2="280" y2="107" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="250" y="100" text-anchor="middle" fill="#f97316" font-size="9">Kafka</text>

  <!-- Kafka topic -->
  <rect x="280" y="82" width="160" height="50" rx="8" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="360" y="102" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">Kafka: trades</text>
  <text x="360" y="119" text-anchor="middle" fill="#78350f" font-size="10">partitioned by market_id</text>

  <line x1="440" y1="107" x2="490" y2="107" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="465" y="100" text-anchor="middle" fill="#f97316" font-size="9">consume</text>

  <!-- Settlement Service boundary -->
  <rect x="490" y="72" width="420" height="480" rx="12" fill="none" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="520" y="92" fill="#3b82f6" font-size="11" font-weight="600">Settlement Service</text>

  <!-- Kafka Consumer inside -->
  <rect x="505" y="82" width="390" height="50" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1.5"/>
  <text x="700" y="102" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="600">Kafka Consumer</text>
  <text x="700" y="119" text-anchor="middle" fill="#78350f" font-size="10">1 goroutine per partition · in-order processing · SI-3</text>

  <line x1="700" y1="132" x2="700" y2="158" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Idempotency Filter -->
  <rect x="505" y="158" width="390" height="54" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="700" y="178" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Idempotency Filter</text>
  <text x="700" y="196" text-anchor="middle" fill="#475569" font-size="10">Query settled_trades by trade_id</text>
  <text x="700" y="210" text-anchor="middle" fill="#475569" font-size="9">SETTLED → ACK no-op · PENDING → skip Phase 1 · none → Phase 1</text>

  <line x1="700" y1="212" x2="700" y2="238" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 1 -->
  <rect x="505" y="238" width="185" height="60" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="597" y="258" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Phase 1 — Short TX</text>
  <text x="597" y="274" text-anchor="middle" fill="#475569" font-size="9">INSERT settled_trades</text>
  <text x="597" y="288" text-anchor="middle" fill="#475569" font-size="9">status = PENDING</text>
  <text x="597" y="300" text-anchor="middle" fill="#166534" font-size="8">COMMIT · DB conn released</text>

  <!-- Phase 2 -->
  <rect x="700" y="238" width="185" height="60" rx="8" fill="#0d1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="792" y="258" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Phase 2 — No DB TX</text>
  <text x="792" y="274" text-anchor="middle" fill="#475569" font-size="9">gRPC: Wallet.SettleTrade()</text>
  <text x="792" y="288" text-anchor="middle" fill="#22c55e" font-size="9">outside any DB transaction</text>
  <text x="792" y="300" text-anchor="middle" fill="#166534" font-size="8">SI-1: no conn held during RPC</text>

  <!-- Arrow Phase 1 → Phase 2 -->
  <line x1="690" y1="268" x2="700" y2="268" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>

  <line x1="700" y1="298" x2="700" y2="328" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 3 -->
  <rect x="505" y="328" width="390" height="60" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="700" y="348" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Phase 3 — Short TX</text>
  <text x="700" y="366" text-anchor="middle" fill="#475569" font-size="10">UPDATE settled_trades SET status=SETTLED, settled_at=NOW()</text>
  <text x="700" y="382" text-anchor="middle" fill="#166534" font-size="9">COMMIT · then ACK Kafka offset · SI-1 · SI-2</text>

  <line x1="700" y1="388" x2="700" y2="414" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ACK Kafka -->
  <rect x="505" y="414" width="390" height="36" rx="7" fill="#0f172a" stroke="#f97316" stroke-width="1.3"/>
  <text x="700" y="432" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">ACK Kafka offset (only after Phase 3 commits)</text>
  <text x="700" y="447" text-anchor="middle" fill="#78350f" font-size="9">Crash before ACK → Kafka redelivers → idempotency check handles PENDING/SETTLED rows</text>

  <!-- Recovery goroutine -->
  <rect x="505" y="468" width="390" height="70" rx="7" fill="#0f172a" stroke="#475569" stroke-width="1.3"/>
  <text x="700" y="488" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Recovery Goroutine (background)</text>
  <text x="700" y="506" text-anchor="middle" fill="#475569" font-size="10">Polls PENDING rows older than 60s · retries Phase 2</text>
  <text x="700" y="522" text-anchor="middle" fill="#334155" font-size="9">FOR UPDATE SKIP LOCKED · prevents double-retry with main consumer</text>
  <text x="700" y="536" text-anchor="middle" fill="#334155" font-size="8">Wallet.SettleTrade is idempotent on trade_id — safe to call multiple times</text>

  <!-- Wallet Service (external) -->
  <rect x="40" y="280" width="200" height="70" rx="8" fill="#0d1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="300" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Wallet Service</text>
  <text x="140" y="318" text-anchor="middle" fill="#166534" font-size="10">SettleTrade (gRPC, idempotent)</text>
  <text x="140" y="334" text-anchor="middle" fill="#166534" font-size="9">Publishes TradeSettled via outbox</text>
  <text x="140" y="348" text-anchor="middle" fill="#334155" font-size="8">(Settlement Svc has NO Kafka output)</text>

  <line x1="490" y1="305" x2="240" y2="305" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="365" y="298" text-anchor="middle" fill="#22c55e" font-size="9">Phase 2 gRPC call</text>
  <line x1="240" y1="330" x2="490" y2="330" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
  <text x="365" y="324" text-anchor="middle" fill="#166534" font-size="9">success ✓</text>

  <!-- PostgreSQL box -->
  <rect x="40" y="410" width="200" height="60" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="430" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">PostgreSQL</text>
  <text x="140" y="448" text-anchor="middle" fill="#475569" font-size="10">settled_trades table</text>
  <text x="140" y="464" text-anchor="middle" fill="#334155" font-size="9">PENDING | SETTLED status</text>

  <line x1="490" y1="370" x2="240" y2="440" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrB)"/>

  <text x="480" y="640" text-anchor="middle" fill="#334155" font-size="10">SI-1: no open DB TX during gRPC · SI-2: SETTLED rows are permanent no-ops · SI-3: 1 goroutine per partition · SI-4: no Kafka publishing</text>
</svg>
