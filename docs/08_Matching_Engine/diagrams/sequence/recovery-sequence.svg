<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrW" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
  </defs>
  <rect width="860" height="640" fill="url(#bg)"/>
  <rect width="860" height="640" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Recovery Sequence</text>
  <text x="430" y="55" text-anchor="middle" fill="#64748b" font-size="12">Node Restart → Checkpoint → Replay → Ready</text>
  <line x1="60" y1="66" x2="800" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Participants: Node=100, PostgreSQL=250, Kafka=400, EventLoop=560, Redis=710 -->
  <text x="100" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">ME Node</text>
  <text x="250" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">PostgreSQL</text>
  <text x="400" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Kafka</text>
  <text x="560" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Event Loop</text>
  <text x="720" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Redis</text>

  <!-- Lifelines -->
  <line x1="100" y1="100" x2="100" y2="610" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="250" y1="100" x2="250" y2="610" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="400" y1="100" x2="400" y2="610" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="560" y1="100" x2="560" y2="610" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="720" y1="100" x2="720" y2="610" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Activation -->
  <rect x="95"  y="100" width="10" height="500" rx="2" fill="#1e3a5f"/>
  <rect x="245" y="116" width="10" height="40" rx="2" fill="#1e3a5f"/>
  <rect x="395" y="170" width="10" height="280" rx="2" fill="#1e3a5f"/>
  <rect x="555" y="215" width="10" height="255" rx="2" fill="#1e3a5f"/>
  <rect x="715" y="468" width="10" height="30" rx="2" fill="#1e3a5f"/>

  <!-- S1: Restart -->
  <rect x="95" y="108" width="90" height="16" rx="3" fill="#0f172a"/>
  <text x="140" y="120" text-anchor="middle" fill="#475569" font-size="9">Restart · Connect Infra</text>

  <!-- S2: Read checkpoint -->
  <line x1="110" y1="136" x2="240" y2="136" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="175" y="130" text-anchor="middle" fill="#60a5fa" font-size="10">SELECT checkpoint</text>
  <line x1="245" y1="156" x2="110" y2="156" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <text x="175" y="150" text-anchor="middle" fill="#3b82f6" font-size="10">{partition, offset=1542}</text>

  <!-- S3: Create empty engine -->
  <rect x="95" y="164" width="90" height="16" rx="3" fill="#0f172a"/>
  <text x="140" y="176" text-anchor="middle" fill="#475569" font-size="9">Create empty Market Engine</text>

  <!-- S4: Seek to offset 0 -->
  <line x1="110" y1="196" x2="390" y2="196" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="250" y="189" text-anchor="middle" fill="#f97316" font-size="10">Seek partition to offset 0</text>

  <!-- S5: Enter RECOVERY mode -->
  <rect x="95" y="207" width="90" height="16" rx="3" fill="#0f1f38"/>
  <text x="140" y="219" text-anchor="middle" fill="#93c5fd" font-size="9">Enter RECOVERY mode</text>

  <!-- Recovery loop marker -->
  <rect x="60" y="230" width="520" height="200" rx="8" fill="none" stroke="#1e3a5f" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="80" y="245" fill="#3b82f6" font-size="10">Replay loop (offset 0 → checkpointOffset 1542)</text>

  <!-- S6: Poll event -->
  <line x1="110" y1="258" x2="390" y2="258" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="250" y="251" text-anchor="middle" fill="#f97316" font-size="10">Poll: OrderCreated / OrderCancelRequested</text>
  <line x1="395" y1="278" x2="110" y2="278" stroke="#f97316" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrO)"/>
  <text x="250" y="272" text-anchor="middle" fill="#78350f" font-size="10">event (output suppressed)</text>

  <!-- S7: Feed to event loop -->
  <line x1="110" y1="300" x2="550" y2="300" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="330" y="293" text-anchor="middle" fill="#22c55e" font-size="10">Feed to Event Loop (RECOVERY mode)</text>

  <!-- S8: Event loop processes (no output) -->
  <rect x="555" y="310" width="120" height="16" rx="3" fill="#0f172a"/>
  <text x="615" y="322" text-anchor="middle" fill="#475569" font-size="9">Match/Cancel · output suppressed</text>

  <!-- More events loop arrow -->
  <line x1="565" y1="338" x2="565" y2="370" stroke="#f59e0b" stroke-width="1.3"/>
  <line x1="565" y1="370" x2="400" y2="370" stroke="#f59e0b" stroke-width="1.3"/>
  <line x1="400" y1="370" x2="400" y2="300" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="490" y="390" text-anchor="middle" fill="#f59e0b" font-size="9">repeat until offset == 1542</text>

  <!-- End recovery loop -->

  <!-- S9: Caught up -->
  <rect x="95" y="444" width="90" height="16" rx="3" fill="#0f172a"/>
  <text x="140" y="456" text-anchor="middle" fill="#475569" font-size="9">offset == checkpointOffset</text>

  <!-- S10: Send sentinel -->
  <line x1="110" y1="470" x2="550" y2="470" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="330" y="463" text-anchor="middle" fill="#22c55e" font-size="10">Sentinel MatchResult → Output Queue</text>

  <!-- S11: Sentinel pushed to Redis -->
  <line x1="565" y1="490" x2="710" y2="490" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrW)"/>
  <text x="637" y="483" text-anchor="middle" fill="#a855f7" font-size="10">Push depth snapshot (sentinel only)</text>

  <!-- S12: LIVE -->
  <rect x="95" y="510" width="90" height="16" rx="3" fill="#0c1a0c"/>
  <text x="140" y="522" text-anchor="middle" fill="#86efac" font-size="9">Transition → LIVE</text>

  <!-- S13: Health ready -->
  <rect x="95" y="536" width="90" height="16" rx="3" fill="#0c1a0c"/>
  <text x="140" y="548" text-anchor="middle" fill="#4ade80" font-size="9">Health: Ready ✓</text>

  <line x1="60" y1="580" x2="800" y2="580" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="430" y="600" text-anchor="middle" fill="#334155" font-size="10">Recovery replays all events from offset 0 · TradeExecuted is never read back · Output fully suppressed during replay</text>
  <text x="430" y="618" text-anchor="middle" fill="#334155" font-size="10">Redis is re-hydrated via sentinel · Checkpoint is not advanced during recovery</text>
</svg>
