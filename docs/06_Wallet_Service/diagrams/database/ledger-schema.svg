<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/><stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="url(#bg)"/>
  <rect width="900" height="560" fill="none" stroke="#1e293b" stroke-width="2"/>
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Ledger Schema — reference_type / transaction_type Map</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">§6.1 V7 — Every gRPC mutation path documents its wallet_transactions write explicitly</text>
  <line x1="60" y1="66" x2="840" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- wallet_transactions enlarged -->
  <rect x="60" y="82" width="780" height="80" rx="8" fill="#0e0a24" stroke="#a855f7" stroke-width="2"/>
  <text x="450" y="104" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">wallet_transactions</text>
  <text x="450" y="122" text-anchor="middle" fill="#6b21a8" font-size="10">UNIQUE(reference_id, reference_type, asset)</text>
  <text x="450" y="140" text-anchor="middle" fill="#475569" font-size="10">id · wallet_id · reference_id (UUID) · reference_type · transaction_type · asset · amount · created_at</text>
  <text x="450" y="156" text-anchor="middle" fill="#334155" font-size="9">Immutable · append-only · every balance change is exactly one row (or two for SettleTrade, one per leg)</text>

  <!-- Reference type map table -->
  <rect x="60" y="182" width="780" height="240" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="202" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">reference_type → gRPC Method Mapping</text>
  <!-- Header row -->
  <rect x="70" y="210" width="760" height="20" rx="3" fill="#1e293b"/>
  <text x="140" y="224" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">gRPC Method</text>
  <text x="290" y="224" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">reference_id</text>
  <text x="430" y="224" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">reference_type</text>
  <text x="570" y="224" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">transaction_type</text>
  <text x="720" y="224" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Notes</text>
  <line x1="80" y1="232" x2="820" y2="232" stroke="#334155" stroke-width="0.5"/>

  <!-- Row 1: InitializeWallet -->
  <rect x="70" y="234" width="760" height="34" rx="3" fill="#0d2137"/>
  <text x="140" y="249" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">InitializeWallet</text>
  <text x="140" y="263" text-anchor="middle" fill="#475569" font-size="9">(Auth Service)</text>
  <text x="290" y="256" text-anchor="middle" fill="#475569" font-size="10">user_id</text>
  <text x="430" y="249" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="600">INITIAL_ALLOCATION</text>
  <text x="430" y="263" text-anchor="middle" fill="#475569" font-size="9">one row per seeded asset</text>
  <text x="570" y="256" text-anchor="middle" fill="#22c55e" font-size="10">CREDIT</text>
  <text x="720" y="256" text-anchor="middle" fill="#475569" font-size="9">UNIQUE ensures 1 allocation per (user, asset)</text>

  <!-- Row 2: ReserveFunds -->
  <rect x="70" y="270" width="760" height="34" rx="3" fill="#0f172a"/>
  <text x="140" y="285" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">ReserveFunds</text>
  <text x="140" y="299" text-anchor="middle" fill="#475569" font-size="9">(Order Service)</text>
  <text x="290" y="292" text-anchor="middle" fill="#475569" font-size="10">order_id</text>
  <text x="430" y="285" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">RESERVATION</text>
  <text x="430" y="299" text-anchor="middle" fill="#475569" font-size="9">one row per reservation</text>
  <text x="570" y="292" text-anchor="middle" fill="#ef4444" font-size="10">DEBIT</text>
  <text x="720" y="292" text-anchor="middle" fill="#475569" font-size="9">available → reserved (reclassified)</text>

  <!-- Row 3: ReleaseFunds -->
  <rect x="70" y="306" width="760" height="34" rx="3" fill="#0d2137"/>
  <text x="140" y="321" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">ReleaseFunds</text>
  <text x="140" y="335" text-anchor="middle" fill="#475569" font-size="9">(Order Service)</text>
  <text x="290" y="328" text-anchor="middle" fill="#475569" font-size="10">order_id</text>
  <text x="430" y="321" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">RELEASE</text>
  <text x="430" y="335" text-anchor="middle" fill="#475569" font-size="9">one row per release</text>
  <text x="570" y="328" text-anchor="middle" fill="#22c55e" font-size="10">CREDIT</text>
  <text x="720" y="328" text-anchor="middle" fill="#475569" font-size="9">reserved → available (§8.3 status guard)</text>

  <!-- Row 4: SettleTrade -->
  <rect x="70" y="342" width="760" height="40" rx="3" fill="#0f172a"/>
  <text x="140" y="358" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">SettleTrade</text>
  <text x="140" y="372" text-anchor="middle" fill="#475569" font-size="9">(Settlement Svc)</text>
  <text x="290" y="365" text-anchor="middle" fill="#475569" font-size="10">trade_id</text>
  <text x="430" y="358" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">SETTLEMENT</text>
  <text x="430" y="372" text-anchor="middle" fill="#475569" font-size="9">2 rows per trade (one per leg)</text>
  <text x="570" y="365" text-anchor="middle" fill="#22c55e" font-size="10">CREDIT ×2</text>
  <text x="720" y="358" text-anchor="middle" fill="#475569" font-size="9">base_asset row (buyer) + quote_asset row (seller)</text>
  <text x="720" y="372" text-anchor="middle" fill="#475569" font-size="8">UNIQUE(trade_id, SETTLEMENT, asset) → both rows covered</text>

  <!-- Legend note -->
  <rect x="60" y="450" width="780" height="72" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="470" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Why the UNIQUE Constraint Covers All Paths</text>
  <text x="90" y="490" fill="#475569" font-size="10">UNIQUE(reference_id, reference_type, asset) is the single constraint that makes all 4 gRPC methods idempotent at the DB level:</text>
  <text x="90" y="506" fill="#475569" font-size="10">– For INITIAL_ALLOCATION: prevents double-seeding per (user, asset) even on concurrent InitializeWallet retries</text>
  <text x="90" y="522" fill="#475569" font-size="10">– For RESERVATION/RELEASE/SETTLEMENT: a caught unique-violation = success signal, not an error (§8.1–8.3)</text>

  <text x="450" y="546" text-anchor="middle" fill="#334155" font-size="10">V7 fix: without asset in the unique key, SettleTrade could only write one SETTLEMENT row per trade instead of two (one per leg)</text>
</svg>
