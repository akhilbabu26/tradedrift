<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#555555" />
    </marker>
    <marker id="one-to-many" viewBox="0 0 20 10" refX="18" refY="5" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <!-- Crow's foot representation for ER diagram -->
      <path d="M 0 5 L 18 5 M 10 0 L 18 5 L 10 10" fill="none" stroke="#555555" stroke-width="1.5" />
      <circle cx="6" cy="5" r="2" fill="white" stroke="#555555" stroke-width="1.5" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa" />  <!-- Table: orders -->
  <rect x="50" y="30" width="240" height="280" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 50 36 A 6 6 0 0 1 56 30 L 284 30 A 6 6 0 0 1 290 36 L 290 60 L 50 60 Z" fill="#4e5d6c" />
  <text x="170" y="50" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">orders</text>
  <text x="62" y="78" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="62" y="102" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  user_id : UUID</text>
  <text x="62" y="126" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  market_id : VARCHAR(20)</text>
  <text x="62" y="150" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  side : VARCHAR(10)</text>
  <text x="62" y="174" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  order_type : VARCHAR(10)</text>
  <text x="62" y="198" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  price : DECIMAL(30,10)</text>
  <text x="62" y="222" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  quantity : DECIMAL(30,10)</text>
  <text x="62" y="246" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  filled_quantity : DECIMAL(30,10)</text>
  <text x="62" y="270" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  remaining_quantity : DECIMAL(30,10)</text>
  <text x="62" y="294" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  status : VARCHAR(20)</text>
  <!-- Table: outbox -->
  <rect x="380" y="30" width="240" height="232" rx="6" ry="6" fill="#ffffff" stroke="#4e5d6c" stroke-width="1.5" />
  <path d="M 380 36 A 6 6 0 0 1 386 30 L 614 30 A 6 6 0 0 1 620 36 L 620 60 L 380 60 Z" fill="#4e5d6c" />
  <text x="500" y="50" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">outbox</text>
  <text x="392" y="78" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="bold" fill="#c0392b">+ id : UUID [PK]</text>
  <text x="392" y="102" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  aggregate_id : UUID</text>
  <text x="392" y="126" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  event_type : VARCHAR(50)</text>
  <text x="392" y="150" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  payload : JSONB</text>
  <text x="392" y="174" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  partition_key : VARCHAR(100)</text>
  <text x="392" y="198" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  status : VARCHAR(20)</text>
  <text x="392" y="222" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  failed_reason : TEXT</text>
  <text x="392" y="246" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="normal" fill="#2c3e50">  created_at : TIMESTAMPTZ</text>
</svg>
