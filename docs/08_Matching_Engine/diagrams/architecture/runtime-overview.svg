<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="900" height="680" fill="url(#bg)"/>
  <rect width="900" height="680" fill="none" stroke="#1e293b" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Matching Engine — Runtime Overview</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Single Node · V1 Deployment · Per-Market Isolation</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Left column: Inbound -->
  <text x="150" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">INBOUND</text>
  <!-- Right column: Outbound -->
  <text x="750" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">OUTBOUND</text>
  <!-- Centre: Processing -->
  <text x="450" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">PROCESSING</text>

  <!-- Kafka in -->
  <rect x="60" y="100" width="180" height="50" rx="8" fill="#1e1a00" stroke="#e96a1a" stroke-width="1.5"/>
  <text x="150" y="122" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">Kafka Consumer</text>
  <text x="150" y="140" text-anchor="middle" fill="#78350f" font-size="10">orders.submitted topic</text>

  <line x1="240" y1="125" x2="310" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Input Queue -->
  <rect x="310" y="100" width="140" height="50" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="380" y="122" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Input Queue</text>
  <text x="380" y="140" text-anchor="middle" fill="#475569" font-size="10">FIFO Channel · Buffered</text>

  <line x1="450" y1="125" x2="450" y2="185" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- Event Loop -->
  <rect x="290" y="185" width="320" height="90" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="207" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Event Loop</text>
  <text x="450" y="225" text-anchor="middle" fill="#334155" font-size="10">Single Goroutine per Market</text>
  <rect x="310" y="233" width="130" height="28" rx="5" fill="#0d2137" stroke="#1e3a5f"/>
  <text x="375" y="251" text-anchor="middle" fill="#60a5fa" font-size="10">Matching Core</text>
  <rect x="460" y="233" width="130" height="28" rx="5" fill="#0d2137" stroke="#1e3a5f"/>
  <text x="525" y="251" text-anchor="middle" fill="#60a5fa" font-size="10">Order Book</text>

  <line x1="450" y1="275" x2="450" y2="330" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- MatchResult -->
  <rect x="330" y="330" width="240" height="44" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="351" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">MatchResult (immutable)</text>
  <text x="450" y="367" text-anchor="middle" fill="#166534" font-size="10">fills · cancelResults · depthSnapshot</text>

  <line x1="450" y1="374" x2="450" y2="420" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Output Queue -->
  <rect x="310" y="420" width="280" height="44" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="442" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Output Queue</text>
  <text x="450" y="458" text-anchor="middle" fill="#475569" font-size="10">Decouples Event Loop from I/O</text>

  <line x1="450" y1="464" x2="450" y2="505" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Publisher -->
  <rect x="290" y="505" width="320" height="56" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="528" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Publisher Layer</text>
  <text x="450" y="546" text-anchor="middle" fill="#475569" font-size="10">Kafka · Redis · PostgreSQL Checkpoint · Metrics</text>
  <text x="450" y="558" text-anchor="middle" fill="#15803d" font-size="10">Runs independently — never blocks Event Loop</text>

  <!-- Right outputs -->
  <line x1="610" y1="530" x2="660" y2="530" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrG)"/>
  <rect x="660" y="490" width="180" height="42" rx="7" fill="#1e0a00" stroke="#e96a1a" stroke-width="1.3"/>
  <text x="750" y="508" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">Kafka: trades.executed</text>
  <text x="750" y="524" text-anchor="middle" fill="#78350f" font-size="10">→ Settlement Service</text>

  <line x1="610" y1="548" x2="660" y2="568" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrG)"/>
  <rect x="660" y="548" width="180" height="42" rx="7" fill="#0e0a24" stroke="#a855f7" stroke-width="1.3"/>
  <text x="750" y="566" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">Redis Snapshot</text>
  <text x="750" y="582" text-anchor="middle" fill="#6b21a8" font-size="10">→ Market Data / WS</text>

  <!-- PG checkpoint -->
  <rect x="200" y="510" width="80" height="36" rx="7" fill="#111" stroke="#334155" stroke-width="1.3"/>
  <text x="240" y="527" text-anchor="middle" fill="#64748b" font-size="10">PostgreSQL</text>
  <text x="240" y="540" text-anchor="middle" fill="#64748b" font-size="10">Checkpoint</text>
  <line x1="290" y1="527" x2="280" y2="527" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Ownership note -->
  <rect x="60" y="610" width="780" height="48" rx="8" fill="#0f172a" stroke="#1e293b"/>
  <text x="450" y="630" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Ownership Boundary</text>
  <text x="450" y="648" text-anchor="middle" fill="#334155" font-size="10">Event Loop is the sole owner of Order Book memory · Publisher only reads immutable MatchResults — no locks required</text>
</svg>
