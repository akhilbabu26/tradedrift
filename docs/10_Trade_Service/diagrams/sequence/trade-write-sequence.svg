<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" width="860" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="860" height="680" fill="url(#bg)" rx="12"/>

  <text x="430" y="36" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="16" font-weight="bold">Trade Service — Write Sequence</text>
  <text x="430" y="54" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Wallet Service → Kafka → Trade Service Consumer → PostgreSQL</text>

  <!-- Participants -->
  <!-- Wallet Service -->
  <rect x="30" y="80" width="130" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="103" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">Wallet Service</text>
  <line x1="95" y1="116" x2="95" y2="640" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Kafka -->
  <rect x="210" y="80" width="130" height="36" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="275" y="103" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">Kafka</text>
  <text x="275" y="113" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="8">TradeSettled topic</text>
  <line x1="275" y1="116" x2="275" y2="640" stroke="#92400e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Trade Consumer -->
  <rect x="390" y="80" width="150" height="36" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="465" y="103" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="10" font-weight="bold">Trade Consumer</text>
  <text x="465" y="113" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">1 goroutine / partition</text>
  <line x1="465" y1="116" x2="465" y2="640" stroke="#0e7490" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PostgreSQL -->
  <rect x="590" y="80" width="130" height="36" rx="6" fill="#1e293b" stroke="#1e40af" stroke-width="1.5"/>
  <text x="655" y="103" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">PostgreSQL</text>
  <text x="655" y="113" text-anchor="middle" fill="#1e40af" font-family="monospace" font-size="8">trades table</text>
  <line x1="655" y1="116" x2="655" y2="640" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Sequence steps -->

  <!-- 1. SettleTrade commits → outbox inserts TradeSettled -->
  <text x="30" y="148" fill="#64748b" font-family="monospace" font-size="8">1.</text>
  <rect x="40" y="140" width="210" height="28" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="145" y="159" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">SettleTrade commits; outbox inserts</text>

  <!-- 2. Outbox publisher → Kafka produce -->
  <text x="30" y="195" fill="#64748b" font-family="monospace" font-size="8">2.</text>
  <line x1="95" y1="185" x2="265" y2="185" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrYellow)"/>
  <rect x="100" y="165" width="160" height="24" rx="4" fill="#0f172a" stroke="#92400e" stroke-width="1"/>
  <text x="180" y="181" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">produce TradeSettled</text>

  <!-- 3. Kafka delivers to consumer -->
  <text x="30" y="230" fill="#64748b" font-family="monospace" font-size="8">3.</text>
  <line x1="275" y1="222" x2="455" y2="222" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="278" y="208" width="174" height="20" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="365" y="222" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">deliver TradeSettled message</text>

  <!-- 4. Consumer validates -->
  <text x="30" y="268" fill="#64748b" font-family="monospace" font-size="8">4.</text>
  <rect x="380" y="253" width="170" height="24" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="465" y="269" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">validate payload (all fields)</text>

  <!-- 5. INSERT ON CONFLICT -->
  <text x="30" y="318" fill="#64748b" font-family="monospace" font-size="8">5.</text>
  <line x1="465" y1="305" x2="645" y2="305" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <rect x="430" y="290" width="212" height="22" rx="4" fill="#0f172a" stroke="#0e7490" stroke-width="1"/>
  <text x="536" y="305" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9">INSERT ON CONFLICT DO NOTHING</text>

  <!-- 6. DB returns (success or no-op) -->
  <text x="30" y="360" fill="#64748b" font-family="monospace" font-size="8">6.</text>
  <line x1="645" y1="347" x2="475" y2="347" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <rect x="490" y="333" width="160" height="20" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="570" y="347" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">ok (1 row) or ok (0 rows)</text>

  <!-- 7. Consumer ACKs offset -->
  <text x="30" y="398" fill="#64748b" font-family="monospace" font-size="8">7.</text>
  <line x1="465" y1="387" x2="285" y2="387" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="315" y="373" width="145" height="20" rx="4" fill="#0f172a" stroke="#14532d" stroke-width="1"/>
  <text x="388" y="387" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">commit offset</text>

  <!-- CRASH PATH box -->
  <rect x="30" y="430" width="790" height="95" rx="8" fill="#0f172a" stroke="#7f1d1d" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="430" y="450" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10" font-weight="bold">Crash Recovery Path (crash between step 5 and step 7)</text>
  <text x="430" y="469" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Consumer restarts → Kafka redelivers message (offset was not committed)</text>
  <text x="430" y="486" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Step 5 runs again → ON CONFLICT (id) DO NOTHING → 0 rows inserted</text>
  <text x="430" y="503" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Step 7 runs → offset committed → safe, no duplicate row in trades table</text>
  <text x="430" y="518" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">No recovery goroutine needed — there is no gRPC call on the write path</text>

  <!-- Footer -->
  <text x="430" y="655" text-anchor="middle" fill="#334155" font-family="monospace" font-size="9">TradeDrift Trade Service V1 · idempotency enforced by PRIMARY KEY + ON CONFLICT · no network call between INSERT and ACK</text>
</svg>
